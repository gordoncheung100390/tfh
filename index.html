<!DOCTYPE html>
<html>
<head>
    <title>SIMPLE BROADCAST</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        video { width: 100%; max-width: 600px; background: #222; border-radius: 10px; margin-top: 20px; }
        button { padding: 20px; width: 100%; max-width: 300px; font-size: 18px; margin: 10px; cursor: pointer; border-radius: 10px; border: none; }
        #status { color: #0f0; font-family: monospace; margin: 20px; }
    </style>
</head>
<body>

    <div id="setup">
        <h2>BROADCAST v5.0</h2>
        <button style="background:#444; color:#fff;" onclick="startPC()">PC: RECEIVE</button>
        <button style="background:#007bff; color:#fff;" onclick="startPhone()">PHONE: SEND</button>
    </div>

    <div id="status">Waiting...</div>
    <video id="remoteVideo" autoplay playsinline></video>

    <script>
        let peer;
        const statusEl = document.getElementById('status');
        const videoEl = document.getElementById('remoteVideo');

        // This is a fixed ID so the phone always knows exactly who to call
        const PC_ID = 'omni-broadcast-test-123'; 

        function startPC() {
            document.getElementById('setup').style.display = 'none';
            statusEl.innerText = "Initializing PC...";

            peer = new Peer(PC_ID, { secure: true });

            peer.on('open', (id) => {
                statusEl.innerText = "READY: Waiting for phone to call...";
            });

            peer.on('call', (call) => {
                statusEl.innerText = "INCOMING CALL! Connecting...";
                call.answer(); 
                call.on('stream', (stream) => {
                    videoEl.srcObject = stream;
                    statusEl.innerText = "LIVE BROADCAST ACTIVE";
                });
            });

            peer.on('error', (err) => {
                statusEl.innerText = "Error: " + err.type;
                if(err.type === 'unavailable-id') alert("Someone else is using this ID. Please refresh.");
            });
        }

        async function startPhone() {
            document.getElementById('setup').style.display = 'none';
            statusEl.innerText = "Starting Camera...";

            peer = new Peer({ secure: true });

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: true 
                });
                videoEl.srcObject = stream;
                videoEl.muted = true; // Don't hear yourself on the phone
                
                statusEl.innerText = "Calling PC...";
                const call = peer.call(PC_ID, stream);
                
                call.on('error', (err) => {
                    statusEl.innerText = "Call failed. Is the PC ready?";
                });
            } catch (e) {
                statusEl.innerText = "Camera Error: " + e.message;
            }
        }
    </script>
</body>
</html>
