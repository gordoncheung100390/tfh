<script>
    const PC_ID = 'omni-ultra-stable-2026';
    let peer;
    const video = document.getElementById('v');
    const status = document.getElementById('status');

    function start(role) {
        document.getElementById('ui').style.display = 'none';
        status.innerText = "Fast-tracking connection...";

        // Use multiple STUN servers to speed up the 'lookup' phase on 5G
        const config = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'stun:stun3.l.google.com:19302' }
            ],
            iceCandidatePoolSize: 10 // Pre-gather paths to save time
        };

        peer = new Peer(role === 'receiver' ? PC_ID : undefined, {
            config: config,
            secure: true,
            debug: 1 // Lower debug level for better performance
        });

        peer.on('open', (id) => {
            if(role === 'receiver') {
                status.innerText = "PC READY: Awaiting 5G...";
            } else {
                sendVideo();
            }
        });

        peer.on('call', (call) => {
            status.innerText = "Signal found! Linking...";
            call.answer();
            
            // Timeout if stream doesn't start in 5 seconds
            const connectTimeout = setTimeout(() => {
                if (!video.srcObject) status.innerText = "Slow network... still trying.";
            }, 5000);

            call.on('stream', (s) => {
                clearTimeout(connectTimeout);
                if (video.srcObject !== s) {
                    video.srcObject = s;
                    video.muted = true; 
                    video.play();
                    status.innerText = "LIVE: CLICK TO UNMUTE";
                }
            });
        });
    }

    async function sendVideo() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: { ideal: 640 } }, 
                audio: true 
            });
            video.srcObject = stream;
            video.muted = true;
            video.play();
            
            status.innerText = "Broadcasting from 5G...";
            const call = peer.call(PC_ID, stream);

            // FORCE RESTART if 5G hangs
            setTimeout(() => {
                if (peer && !peer.destroyed && role === 'sender') {
                    console.log("Refreshing ICE candidates...");
                }
            }, 3000);

        } catch (e) {
            status.innerText = "Camera Error: " + e.message;
        }
    }

    document.addEventListener('click', () => {
        if(video.srcObject) {
            video.muted = false;
            status.innerText = "LIVE (AUDIO ACTIVE)";
        }
    });
</script>
