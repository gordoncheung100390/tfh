<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNISYNC | SYNC ENGINE</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDU1wim3d3MYf-vvYS4JiCcnW278IaWrVs&libraries=places"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #00d2ff; --bg: #0a0a0a; --panel: #1a1a1a; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow: hidden; }

        /* GATEKEEPER */
        #gatekeeper { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .gate-card { background: var(--panel); padding: 40px; border-radius: 12px; text-align: center; border: 1px solid #333; width: 320px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #444; background: #000; color: #fff; box-sizing: border-box; outline: none; }
        .role-selector { display: flex; gap: 10px; margin: 15px 0; }
        .role-btn { flex: 1; padding: 10px; border: 1px solid #444; background: #222; color: #888; cursor: pointer; border-radius: 6px; font-size: 11px; font-weight: bold; }
        .role-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0, 210, 255, 0.1); }

        /* APP LAYOUT */
        #app-shell { display: none; height: 100vh; width: 100vw; }
        #view-3d { flex: 1; background: #111; position: relative; height: 100%; }
        #view-2d { width: 30%; background: var(--panel); position: relative; border-left: 2px solid #000; height: 100%; }
        #resizer { width: 10px; background: #222; cursor: col-resize; z-index: 100; display: flex; align-items: center; justify-content: center; }
        #resizer::after { content: "||"; color: #444; font-size: 10px; }

        /* HUD ELEMENTS */
        .overlay { position: absolute; z-index: 50; pointer-events: none; }
        .status-pill { top: 20px; left: 20px; background: rgba(0,0,0,0.85); padding: 10px 15px; border-radius: 10px; font-size: 10px; border: 1px solid #333; }
        #roster-panel { bottom: 20px; left: 20px; width: 180px; background: rgba(0,0,0,0.7); border-radius: 10px; border: 1px solid #333; padding: 10px; pointer-events: auto; }
        #search-container { top: 20px; right: 20px; width: 300px; pointer-events: auto; display: none; }
        #pac-input { width: 100%; padding: 12px 15px; border-radius: 8px; border: 1px solid var(--accent); background: #000; color: #fff; font-size: 13px; outline: none; box-shadow: 0 0 20px rgba(0,210,255,0.2); }
        
        .controls { bottom: 20px; left: 50%; transform: translateX(-50%); pointer-events: auto; }
        button { background: #fff; color: #000; border: none; padding: 10px 25px; border-radius: 30px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 10px; transition: 0.2s; }
        button#tether-btn.active { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }
    </style>
</head>
<body>

    <div id="gatekeeper">
        <div class="gate-card">
            <h2 style="letter-spacing: 2px;">OMNISYNC</h2>
            <input type="text" id="room-input" placeholder="Room Code">
            <input type="text" id="username-input" placeholder="Your Name">
            <div class="role-selector">
                <div class="role-btn active" id="role-tourist" onclick="App.gatekeeper.setRole('tourist')">TOURIST</div>
                <div class="role-btn" id="role-guide" onclick="App.gatekeeper.setRole('guide')">GUIDE</div>
            </div>
            <button onclick="App.gatekeeper.unlock()" style="width:100%; background: var(--accent);">Initialize Sync</button>
        </div>
    </div>

    <div id="app-shell">
        <div id="view-3d">
            <div class="overlay status-pill">
                <span id="stat-name" style="font-weight: bold; font-size: 12px;">NAME</span><br>
                <span id="stat-role" style="color: var(--accent); text-transform: uppercase;">ROLE</span>
            </div>

            <div class="overlay" id="roster-panel">
                <div style="font-size: 9px; color: #666; margin-bottom: 5px; text-transform: uppercase;">In Room</div>
                <div id="user-list"></div>
            </div>

            <div class="overlay" id="search-container">
                <input id="pac-input" type="text" placeholder="Search Location...">
            </div>

            <div class="overlay controls">
                <button id="tether-btn" onclick="App.brain.toggleTether()">Tethered</button>
            </div>
        </div>
        
        <div id="resizer"></div>
        <div id="view-2d"></div>
    </div>

    <script>
        const App = {
            state: { user: { name: "", id: "U" + Date.now(), role: "tourist" }, roomID: "LOBBY", isTethered: true, isSyncing: false },
            init: function() { this.ui.initResizer(); this.postOffice.init(); },
            
            gatekeeper: {
                setRole: function(role) { 
                    App.state.user.role = role; 
                    document.getElementById('role-tourist').className = role === 'tourist' ? 'role-btn active' : 'role-btn'; 
                    document.getElementById('role-guide').className = role === 'guide' ? 'role-btn active' : 'role-btn'; 
                },
                unlock: function() {
                    const n = document.getElementById('username-input').value.trim();
                    const r = document.getElementById('room-input').value.trim().toUpperCase() || "LOBBY";
                    if(!n) return alert("Please enter your name");
                    
                    App.state.user.name = n; App.state.roomID = r;
                    document.getElementById('gatekeeper').style.display = 'none';
                    document.getElementById('app-shell').style.display = 'flex';
                    document.getElementById('stat-name').innerText = n;
                    document.getElementById('stat-role').innerText = App.state.user.role;
                    
                    if(App.state.user.role === 'guide') {
                        document.getElementById('tether-btn').style.display = 'none';
                        document.getElementById('search-container').style.display = 'block';
                    }
                    
                    setTimeout(() => { 
                        App.eyes.init(); 
                        App.postOffice.checkIn(); 
                        App.postOffice.listenForTourists(); 
                        if(App.state.user.role === 'tourist') App.postOffice.listenForGuide(); 
                    }, 200);
                }
            },

            brain: {
                toggleTether: function() {
                    App.state.isTethered = !App.state.isTethered;
                    const b = document.getElementById('tether-btn');
                    b.innerText = App.state.isTethered ? "Tethered" : "Roaming";
                    b.className = App.state.isTethered ? "" : "active";
                    if(App.state.isTethered) {
                        App.postOffice.db.ref("rooms/" + App.state.roomID + "/guide").once("value", (s) => { 
                            if(s.val()) App.postOffice.applyMove(s.val()); 
                        });
                    }
                }
            }
        };

        App.eyes = {
            map: null, panorama: null, markers: {}, 
            init: function() {
                const s = { lat: 40.7580, lng: -73.9855 };
                this.map = new google.maps.Map(document.getElementById('view-2d'), { 
                    center: s, zoom: 18, streetViewControl: true, mapTypeControl: false,
                    styles: [{ "featureType": "all", "stylers": [{ "invert_lightness": true }, { "saturation": -100 }] }]
                });
                
                this.panorama = new google.maps.StreetViewPanorama(document.getElementById('view-3d'), { 
                    position: s, addressControl: false, pov: { heading: 0, pitch: 0 }
                });
                this.map.setStreetView(this.panorama);
                
                if(App.state.user.role === 'guide') {
                    const ac = new google.maps.places.Autocomplete(document.getElementById("pac-input"));
                    ac.addListener("place_changed", () => { 
                        const p = ac.getPlace(); 
                        if(p.geometry){ 
                            this.panorama.setPosition(p.geometry.location); 
                            this.map.setCenter(p.geometry.location); 
                        } 
                    });
                }

                const sync = () => {
                    const p = this.panorama.getPosition(); 
                    const v = this.panorama.getPov();
                    if(!App.state.isSyncing && p) {
                        this.map.setCenter(p);
                        if(App.state.user.role === 'guide') App.postOffice.transmit(p.lat(), p.lng(), v.heading, v.pitch);
                        App.postOffice.db.ref("rooms/"+App.state.roomID+"/tourists/"+App.state.user.id).update({
                            lat:p.lat(), lng:p.lng(), name:App.state.user.name, role:App.state.user.role
                        });
                    }
                };
                this.panorama.addListener('position_changed', sync); 
                this.panorama.addListener('pov_changed', sync);
            }
        };

        App.postOffice = {
            db: null,
            init: function() { 
                const c = { 
                    apiKey: "AIzaSyBuGMqqCArrL6vKWGRZkgDtn3tvt9wSpoo", 
                    databaseURL: "https://virtual-tour-platform-492518-default-rtdb.firebaseio.com" 
                };
                if (!firebase.apps.length) firebase.initializeApp(c); 
                this.db = firebase.database(); 
            },
            checkIn: function() { 
                const r = this.db.ref("rooms/"+App.state.roomID+"/tourists/"+App.state.user.id); 
                r.onDisconnect().remove(); 
                r.set({name:App.state.user.name, role:App.state.user.role, lat:40.7580, lng:-73.9855}); 
            },
            transmit: function(la, ln, h, pi) { 
                this.db.ref("rooms/"+App.state.roomID+"/guide").set({lat:la, lng:ln, heading:h, pitch:pi}); 
            },
            applyMove: function(d) { 
                App.state.isSyncing = true; 
                App.eyes.panorama.setPosition({lat:d.lat, lng:d.lng}); 
                if(d.heading!==undefined) App.eyes.panorama.setPov({heading:d.heading, pitch:d.pitch||0}); 
                setTimeout(()=>App.state.isSyncing=false, 500); 
            },
            listenForGuide: function() { 
                this.db.ref("rooms/"+App.state.roomID+"/guide").on("value", s => { 
                    if(s.val() && App.state.isTethered) this.applyMove(s.val()); 
                }); 
            },
            listenForTourists: function() {
                this.db.ref("rooms/"+App.state.roomID+"/tourists").on("value", s => {
                    const us = s.val() || {}; 
                    const l = document.getElementById('user-list'); 
                    l.innerHTML = "";
                    Object.keys(us).forEach(id => {
                        const u = us[id];
                        l.innerHTML += `<div style="font-size:12px; margin-bottom:5px;">${u.role==='guide'?'👑':'👤'} ${u.name}</div>`;
                        if(id !== App.state.user.id) {
                            if(!App.eyes.markers[id]) App.eyes.markers[id] = new google.maps.Marker({position:{lat:u.lat, lng:u.lng}, map:App.eyes.map, label:u.name});
                            else App.eyes.markers[id].setPosition({lat:u.lat, lng:u.lng});
                        }
                    });
                });
            }
        };

        App.ui = { 
            initResizer: function() {
                const r = document.getElementById("resizer"); 
                const v = document.getElementById("view-2d");
                r.addEventListener("mousedown", () => { 
                    const m = (e) => { 
                        v.style.width = (window.innerWidth - e.clientX) + "px"; 
                        google.maps.event.trigger(App.eyes.map, "resize"); 
                    };
                    window.addEventListener("mousemove", m); 
                    window.addEventListener("mouseup", () => window.removeEventListener("mousemove", m)); 
                });
            }
        };

        window.onload = () => App.init();
    </script>
</body>
</html>
