<!DOCTYPE html>
<html>
<head>
    <title>BROADCAST 5.2 | 5G BRIDGE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js" crossorigin="anonymous"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        video { width: 100%; max-width: 500px; background: #222; border-radius: 10px; margin-top: 20px; }
        button { padding: 20px; width: 100%; max-width: 300px; font-size: 18px; margin: 10px; cursor: pointer; border: none; border-radius: 10px; }
        #status { color: #0f0; margin: 20px; font-family: monospace; }
    </style>
</head>
<body>

    <div id="ui">
        <h2>5G TO PC BRIDGE</h2>
        <button style="background:#007bff; color:#fff;" onclick="start('sender')">PHONE: SEND (5G)</button>
        <button style="background:#444; color:#fff;" onclick="start('receiver')">PC: RECEIVE (Wi-Fi)</button>
    </div>

    <div id="status">Waiting...</div>
    <video id="v" autoplay playsinline muted></video>

    <script>
        const PC_ID = 'omni-5g-bridge-2026';
        let peer;

        function start(role) {
            document.getElementById('ui').style.display = 'none';
            document.getElementById('status').innerText = "Opening Relay Tunnel...";

            // These STUN servers help 5G find your home Wi-Fi IP
            const config = {
                'iceServers': [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' }
                ]
            };

            peer = new Peer(role === 'receiver' ? PC_ID : undefined, {
                config: config,
                secure: true,
                debug: 2
            });

            peer.on('open', (id) => {
                if(role === 'receiver') {
                    document.getElementById('status').innerText = "PC READY: Waiting for 5G signal...";
                } else {
                    sendVideo();
                }
            });

            peer.on('call', (call) => {
                document.getElementById('status').innerText = "5G Signal Found! Connecting...";
                call.answer();
                call.on('stream', (s) => {
                    const video = document.getElementById('v');
                    video.srcObject = s;
                    video.muted = false;
                    video.play();
                    document.getElementById('status').innerText = "LIVE FROM 5G";
                });
            });
        }

        async function sendVideo() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: true });
                document.getElementById('v').srcObject = stream;
                document.getElementById('status').innerText = "Broadcasting on 5G...";
                peer.call(PC_ID, stream);
            } catch (e) {
                alert("Camera error: " + e.message);
            }
        }

        // Essential for PC Audio
        document.addEventListener('click', () => { document.getElementById('v').muted = false; });
    </script>
</body>
</html>
