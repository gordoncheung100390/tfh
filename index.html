<!DOCTYPE html>
<html>
<head>
    <title>OMNISYNC 17.3 | SUCCESS</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #111; padding: 25px; border-radius: 20px; border: 1px solid #333; max-width: 350px; margin: auto; }
        input { padding: 15px; width: 85%; margin: 10px 0; border-radius: 10px; background: #000; color: #fff; border: 1px solid #444; text-align: center; }
        button { padding: 15px; width: 95%; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin: 5px; color: white; }
        #status { font-size: 11px; color: #555; margin-top: 10px; }
        video { width: 100%; max-width: 500px; border-radius: 15px; border: 2px solid #007bff; display: none; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="setup" class="card">
        <h2>OMNISYNC 17.3</h2>
        <input type="text" id="room-id" placeholder="Room Name">
        <button style="background:#333;" onclick="start('PC')">PC: RECEIVE</button>
        <button style="background:#007bff;" onclick="start('PHONE')">PHONE: SEND</button>
        <p id="status">READY</p>
    </div>

    <video id="v" autoplay playsinline muted></video>

    <script>
        // !!! REPLACE THIS WHOLE BLOCK WITH YOUR DATA FROM FIREBASE SETTINGS !!!
        const firebaseConfig = {
            apiKey: " apiKey: "AIzaSyARIK3hr04dEDQ1lZZM5AkQvJurRwQy6Z4",
            databaseURL: "https://omnisync-b7a25-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "omnisync-b7a25"
        };
        // !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!

        let db;
        let peer = null;
        const video = document.getElementById('v');
        const status = document.getElementById('status');

        // Initialize Firebase
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
        } catch (e) {
            status.innerText = "CONFIG ERROR - CHECK CONSOLE";
        }

        async function start(role) {
            const room = document.getElementById('room-id').value.trim().toLowerCase();
            if(!room) return alert("Enter Room Name");

            status.innerText = "OPENING GOOGLE TUNNEL...";

            peer = new Peer(role + '-' + room, { secure: true });

            if(role === 'PC') {
                peer.on('open', () => {
                    db.ref('rooms/' + room).set({ pc_ready: true, time: Date.now() });
                    status.innerText = "WAITING FOR PHONE...";
                });
                peer.on('call', call => {
                    status.innerText = "SIGNAL DETECTED!";
                    call.answer();
                    call.on('stream', s => handleStream(s));
                });
            } else {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: true });
                    handleStream(stream);
                    db.ref('rooms/' + room).on('value', snap => {
                        if(snap.val()?.pc_ready) {
                            status.innerText = "PUNCHING THROUGH...";
                            peer.call('PC-' + room, stream);
                        }
                    });
                } catch(e) { alert("Camera Error"); }
            }
        }

        function handleStream(s) {
            document.getElementById('setup').style.display = 'none';
            video.style.display = 'block';
            video.srcObject = s;
            video.play().catch(() => {});
        }
    </script>
</body>
</html>
