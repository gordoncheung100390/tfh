<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BROADCAST 5.1 | BYPASS</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js" crossorigin="anonymous"></script>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        #video-wrapper { position: relative; width: 100%; max-width: 500px; margin: 20px auto; aspect-ratio: 16/9; background: #000; border: 2px solid #333; border-radius: 12px; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        button { padding: 18px; width: 100%; max-width: 280px; font-size: 16px; margin: 10px; cursor: pointer; border-radius: 10px; border: none; font-weight: bold; }
        #status { font-family: monospace; color: #0f0; margin: 15px; font-size: 13px; min-height: 1.2em; }
    </style>
</head>
<body>

    <div id="ui-initial">
        <h2>BROADCAST 5.1</h2>
        <button style="background:#007bff; color:#fff;" onclick="init('sender')">PHONE: START BROADCAST</button>
        <button style="background:#444; color:#fff;" onclick="init('receiver')">PC: RECEIVE VIDEO</button>
    </div>

    <div id="status">Waiting for user...</div>

    <div id="video-wrapper">
        <video id="v" autoplay playsinline muted></video>
    </div>

    <script>
        const status = document.getElementById('status');
        const video = document.getElementById('v');
        const PC_ID = 'omni-secure-channel-2026'; 
        let peer;

        async function init(role) {
            document.getElementById('ui-initial').style.display = 'none';
            status.innerText = "Configuring Security Bypass...";

            // Initialize PeerJS with a specific config to avoid storage tracking errors
            peer = new Peer(role === 'receiver' ? PC_ID : undefined, {
                debug: 2,
                secure: true,
                config: {
                    'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }]
                }
            });

            peer.on('open', (id) => {
                if (role === 'receiver') {
                    status.innerText = "PC READY: Waiting for phone...";
                } else {
                    startPhoneStream();
                }
            });

            peer.on('error', (err) => {
                console.error(err);
                status.style.color = '#ff4444';
                status.innerText = "Network Error: " + err.type;
                if(err.type === 'unavailable-id') alert("Channel busy. Refresh PC and try again.");
            });

            // PC Receiver Logic
            peer.on('call', (call) => {
                status.innerText = "CONNECTED! Receiving pixels...";
                call.answer();
                call.on('stream', (remoteStream) => {
                    video.srcObject = remoteStream;
                    video.muted = false; // PC hears the audio
                    video.play();
                });
            });
        }

        async function startPhoneStream() {
            status.innerText = "Accessing Camera...";
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: true 
                });
                
                // Show local camera on phone so you know it's working
                video.srcObject = stream;
                status.innerText = "Connecting to PC...";

                const call = peer.call(PC_ID, stream);
                
                call.on('error', (err) => {
                    status.innerText = "Handshake failed. Refresh PC.";
                });
            } catch (e) {
                status.innerText = "Hardware Blocked: " + e.message;
            }
        }

        // Global Unmute for PC
        document.addEventListener('click', () => {
            if(video.srcObject) {
                video.muted = false;
                status.innerText = "LIVE STREAM ACTIVE (AUDIO ON)";
            }
        });
    </script>
</body>
</html>
