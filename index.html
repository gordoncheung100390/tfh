<script>
    const PC_ID = 'omni-5g-aggressor-2026';
    let peer;
    let callRetryInterval;
    const video = document.getElementById('v');
    const status = document.getElementById('status');

    function start(role) {
        document.getElementById('ui').style.display = 'none';
        status.innerText = "Initiating 5G Tunnel...";

        peer = new Peer(role === 'receiver' ? PC_ID : undefined, {
            secure: true,
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' },
                    { urls: 'stun:stun3.l.google.com:19302' }
                ],
                iceTransportPolicy: 'all',
                iceCandidatePoolSize: 10
            }
        });

        peer.on('open', (id) => {
            if(role === 'receiver') {
                status.innerText = "PC READY: Awaiting 5G Signal...";
            } else {
                startCameraAndCall();
            }
        });

        peer.on('call', (call) => {
            status.innerText = "SIGNAL DETECTED... CONNECTING";
            call.answer();
            call.on('stream', (s) => {
                if (video.srcObject !== s) {
                    video.srcObject = s;
                    video.play();
                    status.innerText = "LIVE: CLICK TO UNMUTE";
                }
            });
        });
    }

    async function startCameraAndCall() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: 640 }, 
                audio: true 
            });
            video.srcObject = stream;
            video.muted = true;
            video.play();

            // AGGRESSIVE RETRY: Call the PC every 3 seconds until it answers
            status.innerText = "Broadcasting (5G)...";
            const attemptCall = () => {
                if (peer && !peer.destroyed) {
                    console.log("Attempting handshake...");
                    peer.call(PC_ID, stream);
                }
            };

            attemptCall();
            callRetryInterval = setInterval(() => {
                if (status.innerText.includes("Broadcasting")) {
                    attemptCall();
                } else {
                    clearInterval(callRetryInterval);
                }
            }, 3000);

        } catch (e) { status.innerText = "Camera Error"; }
    }
</script>
