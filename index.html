<!DOCTYPE html>
<html>
<head>
    <title>OMNISYNC 7.0 | STUBBORN</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js" crossorigin="anonymous"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; }
        .hero { padding: 40px 20px; }
        #v-container { width: 100vw; height: 60vh; background: #111; position: relative; }
        video { width: 100%; height: 100%; object-fit: contain; }
        button { padding: 20px; width: 80%; max-width: 300px; font-size: 18px; margin: 10px; cursor: pointer; border-radius: 50px; border: none; font-weight: bold; }
        #status { color: #555; font-size: 12px; margin: 10px; }
        #unmute-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body>

    <div id="ui" class="hero">
        <h2>BROADCAST 7.0</h2>
        <button style="background:#007bff; color:#fff;" onclick="run('sender')">PHONE: START SENDING</button>
        <button style="background:#333; color:#fff;" onclick="run('receiver')">PC: START RECEIVING</button>
        <div id="status">System Ready</div>
    </div>

    <div id="v-container">
        <div id="unmute-overlay" onclick="unmute()">
            <button style="background:#00ff00; color:#000;">TAP TO SEE VIDEO & AUDIO</button>
        </div>
        <video id="v" autoplay playsinline muted></video>
    </div>

    <script>
        const video = document.getElementById('v');
        const status = document.getElementById('status');
        const CHANNEL = 'omnisync-fixed-channel-999'; // THE PERMANENT ID
        let peer;

        async function run(role) {
            document.getElementById('ui').style.display = 'none';
            status.innerText = "Connecting to Network...";

            peer = new Peer(role === 'receiver' ? CHANNEL : undefined, {
                secure: true,
                config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] }
            });

            peer.on('open', () => {
                if(role === 'receiver') {
                    status.innerText = "PC READY. Waiting for mobile...";
                } else {
                    startCamera();
                }
            });

            peer.on('call', (call) => {
                status.innerText = "Receiving Signal...";
                call.answer();
                call.on('stream', (stream) => {
                    video.srcObject = stream;
                    document.getElementById('unmute-overlay').style.display = 'flex';
                    status.innerText = "SIGNAL RECEIVED";
                });
            });
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: true });
                video.srcObject = stream;
                status.innerText = "Broadcasting...";
                peer.call(CHANNEL, stream);
            } catch (e) {
                alert("Camera Error: " + e.message);
            }
        }

        function unmute() {
            video.muted = false;
            video.play();
            document.getElementById('unmute-overlay').style.display = 'none';
            status.innerText = "LIVE";
        }
    </script>
</body>
</html>
