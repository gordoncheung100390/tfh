<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNISYNC | V3.12 STABLE</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDU1wim3d3MYf-vvYS4JiCcnW278IaWrVs&libraries=places"></script>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <style>
        :root { --accent: #00d2ff; --bg: #0a0a0a; --panel: #1a1a1a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100dvh; width: 100vw; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }
        #gatekeeper { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .gate-card { background: var(--panel); padding: 30px; border-radius: 15px; text-align: center; border: 1px solid #333; width: 100%; max-width: 350px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #000; color: #fff; font-size: 16px; }
        #app-shell { display: none; height: 100dvh; width: 100vw; flex-direction: column; }
        #view-3d { flex: 1.2; background: #111; position: relative; width: 100%; }
        #view-2d { flex: 0.8; background: var(--panel); width: 100%; border-top: 2px solid #000; }
        @media (min-width: 768px) { #app-shell { flex-direction: row; } #view-3d { flex: 1; } #view-2d { width: 350px; flex: none; border-top: none; border-left: 2px solid #000; } }
        #video-container { position: absolute; top: 10px; left: 10px; width: 160px; aspect-ratio: 16/9; background: #000; border-radius: 8px; border: 2px solid var(--accent); overflow: hidden; z-index: 1000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #unmute-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1010; }
        #search-container { position: absolute; top: 10px; right: 10px; width: 180px; z-index: 1000; display: none; }
        #pac-input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--accent); background: #000; color: #fff; font-size: 14px; }
        .controls { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 1000; width: 90%; justify-content: center; }
        button { background: #fff; color: #000; border: none; padding: 12px 18px; border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 11px; }
        button.active { background: var(--accent); }
        #roster-panel { position: absolute; bottom: 60px; left: 10px; width: 120px; background: rgba(0,0,0,0.6); padding: 8px; border-radius: 8px; font-size: 10px; z-index: 1000; pointer-events: none; }
    </style>
</head>
<body>

    <div id="gatekeeper">
        <div class="gate-card">
            <h2 style="margin-top:0;">OMNISYNC 3.12</h2>
            <input type="text" id="room-input" placeholder="Room Code">
            <input type="text" id="username-input" placeholder="Your Name">
            <div style="display:flex; gap:10px; margin: 15px 0;">
                <button id="btn-t" onclick="App.setRole('tourist')" style="flex:1">TOURIST</button>
                <button id="btn-g" onclick="App.setRole('guide')" style="flex:1; background:#222; color:#888;">GUIDE</button>
            </div>
            <button onclick="App.launch()" style="width:100%; background: var(--accent); padding:15px; font-size: 16px;">START</button>
        </div>
    </div>

    <div id="app-shell">
        <div id="view-3d">
            <div id="video-container">
                <div id="unmute-overlay">
                    <button onclick="App.studio.forcePlay()" style="background:var(--accent); padding:10px 20px; border-radius:30px;">WATCH LIVE</button>
                </div>
                <video id="view" autoplay playsinline muted></video>
            </div>
            <div id="search-container"><input id="pac-input" type="text" placeholder="Search..."></div>
            <div id="roster-panel"><div id="user-list"></div></div>
            <div class="controls">
                <button id="tether-btn" onclick="App.brain.toggleTether()">Tethered</button>
                <button id="broadcast-btn" onclick="App.studio.startBroadcast()" style="display:none; background:#ff4444; color:white;">GO LIVE</button>
            </div>
        </div>
        <div id="view-2d"></div>
    </div>

    <script>
        const App = {
            state: { role: 'tourist', room: 'LOBBY', name: 'User', id: "U"+Date.now(), isTethered: true, isSyncing: false },
            setRole: function(r) {
                this.state.role = r;
                document.getElementById('btn-t').style = r==='tourist' ? "background:#fff" : "background:#222;color:#888";
                document.getElementById('btn-g').style = r==='guide' ? "background:#fff" : "background:#222;color:#888";
            },
            launch: function() {
                this.state.name = document.getElementById('username-input').value || "User";
                this.state.room = document.getElementById('room-input').value.toUpperCase() || "LOBBY";
                document.getElementById('gatekeeper').style.display = 'none';
                document.getElementById('app-shell').style.display = 'flex';
                if(this.state.role === 'guide') {
                    document.getElementById('search-container').style.display = 'block';
                    document.getElementById('broadcast-btn').style.display = 'block';
                    document.getElementById('tether-btn').style.display = 'none';
                }
                App.postOffice.init(); App.eyes.init(); App.studio.init();
            }
        };

        App.eyes = {
            map: null, panorama: null, markers: {},
            init: function() {
                const center = { lat: 40.758, lng: -73.985 };
                this.map = new google.maps.Map(document.getElementById('view-2d'), { center: center, zoom: 17, streetViewControl: true, mapTypeControl: false, zoomControl: false });
                this.panorama = new google.maps.StreetViewPanorama(document.getElementById('view-3d'), { position: center, addressControl: false });
                this.map.setStreetView(this.panorama);
                const report = () => {
                    const p = this.panorama.getPosition(); const v = this.panorama.getPov(); if(!p) return;
                    this.map.setCenter(p);
                    if(App.state.role === 'guide' && !App.state.isSyncing) { App.postOffice.transmit({ lat: p.lat(), lng: p.lng(), h: v.heading, p: v.pitch }); }
                    App.postOffice.db.ref("rooms/"+App.state.room+"/users/"+App.state.id).update({ lat: p.lat(), lng: p.lng(), name: App.state.name, role: App.state.role });
                };
                this.panorama.addListener('position_changed', report); this.panorama.addListener('pov_changed', report);
            },
            renderDots: function(users) {
                Object.keys(users).forEach(uid => {
                    if(uid === App.state.id) return;
                    const u = users[uid]; if(!u.lat) return;
                    if(this.markers[uid]) { this.markers[uid].setPosition({lat: u.lat, lng: u.lng}); } else {
                        this.markers[uid] = new google.maps.Marker({
                            position: {lat: u.lat, lng: u.lng}, map: this.map, label: { text: u.name[0], color: "white" },
                            icon: { path: google.maps.SymbolPath.CIRCLE, scale: 7, fillColor: u.role === 'guide' ? "#ff0000" : "#00d2ff", fillOpacity: 1, strokeWeight: 2, strokeColor: "#fff" }
                        });
                    }
                });
            }
        };

        App.postOffice = {
            db: null,
            init: function() {
                const config = { apiKey: "AIzaSy...", databaseURL: "https://virtual-tour-platform-492518-default-rtdb.firebaseio.com" };
                if (!firebase.apps.length) firebase.initializeApp(config);
                this.db = firebase.database();
                this.db.ref("rooms/"+App.state.room+"/users/"+App.state.id).onDisconnect().remove();

                if(App.state.role === 'guide') {
                    // GUIDE: Watch for "pokes" from tourists and call them
                    this.db.ref("rooms/"+App.state.room+"/pokes").on("child_added", (snap) => {
                        const touristId = snap.val().id;
                        if(App.studio.mystream) {
                            console.log("Detected Poke! Pushing stream to:", touristId);
                            App.studio.peer.call("ID-" + touristId, App.studio.mystream);
                        }
                        snap.ref.remove(); // Clear poke after handling
                    });
                } else {
                    // TOURIST: Tether logic
                    this.db.ref("rooms/"+App.state.room+"/guide").on("value", s => { if(s.val() && App.state.isTethered) App.postOffice.applyMove(s.val()); });
                    
                    // TOURIST: Watch for stream active flag and send a "Poke"
                    this.db.ref("rooms/"+App.state.room+"/stream").on("value", s => {
                        if(s.val() && s.val().active) {
                            console.log("Guide is active. Sending Poke...");
                            this.db.ref("rooms/"+App.state.room+"/pokes").push({ id: App.state.id });
                        }
                    });
                }

                this.db.ref("rooms/"+App.state.room+"/users").on("value", s => {
                    const users = s.val() || {};
                    document.getElementById('user-list').innerHTML = Object.values(users).map(u => `<div>${u.role==='guide'?'👑':'👤'} ${u.name}</div>`).join('');
                    App.eyes.renderDots(users);
                });
            },
            transmit: function(data) { this.db.ref("rooms/"+App.state.room+"/guide").set(data); },
            applyMove: function(d) {
                App.state.isSyncing = true;
                App.eyes.panorama.setPosition({lat: d.lat, lng: d.lng}); App.eyes.panorama.setPov({heading: d.h, pitch: d.p});
                setTimeout(() => App.state.isSyncing = false, 200);
            }
        };

        App.studio = {
            peer: null, mystream: null,
            init: function() {
                // Using "ID-" prefix to avoid simple number-only ID issues
                this.peer = new Peer("ID-" + App.state.id, { debug: 1 });
                
                this.peer.on('call', call => {
                    console.log("Incoming call received!");
                    call.answer();
                    call.on('stream', s => {
                        const v = document.getElementById('view');
                        v.srcObject = s;
                        document.getElementById('unmute-overlay').style.display = 'flex';
                    });
                });
            },
            startBroadcast: async function() {
                try {
                    const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: true });
                    this.mystream = s;
                    document.getElementById('view').srcObject = s;
                    document.getElementById('view').muted = true;
                    App.postOffice.db.ref("rooms/"+App.state.room+"/stream").set({ active: true, ts: Date.now() });
                    alert("LIVE. Tourists notified.");
                } catch (e) { alert("Camera failed: " + e.message); }
            },
            forcePlay: function() {
                const v = document.getElementById('view'); v.muted = false; v.play();
                document.getElementById('unmute-overlay').style.display = 'none';
            }
        };

        App.brain = {
            toggleTether: function() {
                App.state.isTethered = !App.state.isTethered;
                const btn = document.getElementById('tether-btn');
                btn.innerText = App.state.isTethered ? "Tethered" : "Roaming";
                btn.className = App.state.isTethered ? "" : "active";
            }
        };
    </script>
</body>
</html>
