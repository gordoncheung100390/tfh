<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One-Way Broadcast</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #111; color: #fff; text-align: center; margin: 0; padding: 20px; }
        .video-box { width: 100%; max-width: 720px; aspect-ratio: 16/9; background: #000; border-radius: 12px; margin: 20px auto; overflow: hidden; border: 2px solid #333; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .controls { background: #222; padding: 20px; border-radius: 10px; display: inline-block; }
        input { padding: 10px; border-radius: 5px; border: 1px solid #444; background: #000; color: #fff; margin-bottom: 10px; }
        button { padding: 10px 20px; border-radius: 5px; border: none; background: #28a745; color: white; font-weight: bold; cursor: pointer; }
        #peer-id-display { color: #00d4ff; font-weight: bold; font-family: monospace; font-size: 1.2em; margin: 10px; }
    </style>
</head>
<body>

    <h2>Live Stream</h2>
    
    <div class="video-box">
        <video id="view" autoplay playsinline></video>
    </div>

    <div class="controls">
        <div id="role-text">Initializing...</div>
        <div id="peer-id-display">Connecting to network...</div>
        
        <div id="sender-ui" style="display:none;">
            <input type="text" id="target-id" placeholder="Paste PC ID here">
            <br>
            <button onclick="startBroadcast()">Start Broadcasting</button>
        </div>
    </div>

    <script>
        const videoElem = document.getElementById('view');
        const idDisplay = document.getElementById('peer-id-display');
        const senderUI = document.getElementById('sender-ui');
        const roleText = document.getElementById('role-text');
        
        let localStream;
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

        const peer = new Peer({
            config: { 'iceServers': [{ url: 'stun:stun1.l.google.com:19302' }, { url: 'stun:stun2.l.google.com:19302' }] }
        });

        // 1. Setup based on device
        peer.on('open', (id) => {
            idDisplay.innerText = id;
            if (isMobile) {
                roleText.innerText = "YOU ARE THE SENDER (Phone)";
                senderUI.style.display = "block";
                setupCamera();
            } else {
                roleText.innerText = "YOU ARE THE RECEIVER (PC). Copy ID below:";
            }
        });

        // 2. Camera setup for the phone
        async function setupCamera() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                videoElem.srcObject = localStream;
                videoElem.muted = true; // Stay muted on phone to prevent feedback
            } catch (e) {
                alert("Camera error: " + e.message);
            }
        }

        // 3. Sender Logic (Phone calls PC)
        function startBroadcast() {
            const targetId = document.getElementById('target-id').value;
            if (!targetId) return alert("Enter the PC ID!");
            
            // Call the PC and send the phone's stream
            peer.call(targetId, localStream);
            roleText.innerText = "LIVE - BROADCASTING";
        }

        // 4. Receiver Logic (PC answers Phone)
        peer.on('call', (call) => {
            roleText.innerText = "LIVE - RECEIVING FEED";
            call.answer(); // Answer with nothing (one-way)
            call.on('stream', (remoteStream) => {
                videoElem.srcObject = remoteStream;
                videoElem.muted = false; // Play audio on PC
            });
        });

    </script>
</body>
</html>
