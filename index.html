<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNISYNC 6.2 | MANUAL DEPLOYMENT</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDU1wim3d3MYf-vvYS4JiCcnW278IaWrVs&libraries=places"></script>
    
    <style>
        :root { --accent: #00d2ff; --bg: #0a0a0a; --panel: #1a1a1a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100dvh; width: 100vw; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }

        #gatekeeper { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .gate-card { background: var(--panel); padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #333; width: 100%; max-width: 350px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #444; background: #000; color: #fff; font-size: 16px; outline: none; }

        #app-shell { display: none; height: 100dvh; width: 100vw; flex-direction: column; }
        #view-3d { height: 50%; background: #111; position: relative; overflow: hidden; min-height: 10%; }
        #view-2d { flex: 1; background: var(--panel); min-height: 10%; }

        #resizer { 
            height: 12px; width: 100%; background: #222; 
            cursor: ns-resize; display: flex; align-items: center; 
            justify-content: center; z-index: 2000; border-top: 1px solid #333; 
            border-bottom: 1px solid #000; touch-action: none;
        }
        #resizer::after { content: ''; width: 40px; height: 4px; background: #555; border-radius: 2px; }

        @media (min-width: 768px) {
            #app-shell { flex-direction: row; }
            #view-3d { width: 50%; height: 100% !important; min-width: 10%; }
            #resizer { width: 12px; height: 100%; cursor: ew-resize; border: none; border-left: 1px solid #333; border-right: 1px solid #000; }
            #resizer::after { width: 4px; height: 40px; }
        }

        #chat-outer {
            position: absolute; bottom: 60px; left: 10px; width: 260px; height: 220px;
            background: rgba(0,0,0,0.6); border-radius: 10px; display: flex; flex-direction: column;
            border: 1px solid rgba(255,255,255,0.1); z-index: 1200; backdrop-filter: blur(5px);
        }
        #chat-messages { flex: 1; overflow-y: auto; padding: 8px; font-size: 13px; display: flex; flex-direction: column; gap: 4px; }
        .msg { word-wrap: break-word; line-height: 1.4; }
        .msg b { color: var(--accent); }
        
        #chat-input-row { display: flex; border-top: 1px solid rgba(255,255,255,0.1); padding: 5px; gap: 5px; }
        #chat-input-row input { flex: 1; background: rgba(0,0,0,0.3); border: 1px solid #444; padding: 8px; color: white; font-size: 13px; margin: 0; border-radius: 8px; }
        #chat-send-btn { background: var(--accent); color: #000; border: none; padding: 0 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 11px; height: 35px; }
        
        #presence-roster {
            position: absolute; top: 200px; left: 10px; 
            background: rgba(0,0,0,0.8); padding: 10px; 
            border-radius: 8px; font-size: 11px; z-index: 1100;
            border: 1px solid rgba(255,255,255,0.1); pointer-events: none;
        }

        #video-container { 
            position: absolute; top: 10px; left: 10px; 
            width: 280px; height: 180px; 
            background: #000; border-radius: 12px; 
            border: 2px solid var(--accent); 
            overflow: hidden; z-index: 1000; 
        }

        #video-shield {
            position: absolute; inset: 0;
            z-index: 1002;
            background: transparent;
            pointer-events: none;
        }
        
        #wherebyFrame { 
            width: 150%; height: 150%; 
            border: none; 
            position: absolute;
            top: -25%; left: -25%; 
        }

        #search-container { position: absolute; top: 10px; right: 10px; width: 180px; z-index: 1001; display: none; }
        #pac-input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--accent); background: #000; color: #fff; font-size: 14px; }
        .controls { position: absolute; bottom: 15px; right: 15px; z-index: 1000; }
        button { background: #fff; color: #000; border: none; padding: 10px 18px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 11px; }
        button.active { background: var(--accent); }
    </style>
</head>
<body>

    <div id="gatekeeper">
        <div class="gate-card">
            <h2>OmniSync <span style="color:var(--accent)">6.2</span></h2>
            <input type="text" id="room-input" placeholder="Room Code">
            <input type="text" id="username-input" placeholder="Your Name">
            <div style="display:flex; gap:10px; margin: 15px 0;">
                <button id="btn-t" onclick="App.setRole('tourist')" style="flex:1">TOURIST</button>
                <button id="btn-g" onclick="App.setRole('guide')" style="flex:1; background:#222; color:#888;">GUIDE</button>
            </div>
            <button onclick="App.launch()" style="width:100%; background: var(--accent); color:black; padding:15px; border-radius: 12px; font-weight:bold;">LAUNCH TOUR</button>
        </div>
    </div>

    <div id="app-shell">
        <div id="view-3d">
            <div id="presence-roster"><div style="color:var(--accent); font-weight:bold; margin-bottom:5px;">ONLINE</div><div id="user-list-render"></div></div>
            <div id="chat-outer">
                <div id="chat-messages"></div>
                <div id="chat-input-row">
                    <input type="text" id="chat-msg-field" placeholder="Message..." onkeydown="if(event.key==='Enter') App.brain.sendChat()">
                    <button id="chat-send-btn" onclick="App.brain.sendChat()">SEND</button>
                </div>
            </div>
            <div id="video-container">
                <div id="video-shield"></div> <iframe id="wherebyFrame" allow="camera; microphone; fullscreen; speaker; display-capture"></iframe>
            </div>
            <div id="search-container"><input id="pac-input" type="text" placeholder="Search Location..."></div>
            <div class="controls" id="tourist-controls" style="display:none;"><button id="tether-btn" onclick="App.brain.toggleTether()">Tethered</button></div>
        </div>
        <div id="resizer"></div>
        <div id="view-2d"></div>
    </div>

    <script>
        const App = {
            state: { role: 'tourist', room: 'LOBBY', name: 'User', id: "U"+Date.now(), isTethered: true, isSyncing: false },
            setRole: function(r) {
                this.state.role = r;
                document.getElementById('btn-t').style = r==='tourist' ? "background:#fff" : "background:#222;color:#888";
                document.getElementById('btn-g').style = r==='guide' ? "background:#fff" : "background:#222;color:#888";
            },
            launch: function() {
                this.state.name = document.getElementById('username-input').value || "User";
                this.state.room = document.getElementById('room-input').value.toUpperCase() || "LOBBY";
                document.getElementById('gatekeeper').style.display = 'none';
                document.getElementById('app-shell').style.display = 'flex';
                App.postOffice.init(); App.eyes.init(); App.studio.init(); App.ui.initResizer();
                
                if(this.state.role === 'guide') { 
                    document.getElementById('search-container').style.display = 'block'; 
                    document.getElementById('video-shield').style.display = 'none'; 
                    App.postOffice.clearChat(); 
                } else { 
                    document.getElementById('tourist-controls').style.display = 'block'; 
                }
            },
            brain: {
                toggleTether: function() {
                    App.state.isTethered = !App.state.isTethered;
                    const btn = document.getElementById('tether-btn');
                    btn.innerText = App.state.isTethered ? "Tethered" : "Roaming";
                    btn.className = App.state.isTethered ? "" : "active";
                    if(App.state.isTethered) {
                        App.postOffice.db.ref("rooms/"+App.state.room+"/guide").once("value", s => { if(s.val()) App.postOffice.applyMove(s.val()); });
                    }
                },
                sendChat: function() {
                    const field = document.getElementById('chat-msg-field');
                    if(!field.value.trim()) return;
                    App.postOffice.db.ref("rooms/"+App.state.room+"/chats").push({ sender: App.state.name, text: field.value, time: firebase.database.ServerValue.TIMESTAMP });
                    field.value = "";
                }
            }
        };

        App.ui = {
            initResizer: function() {
                const resizer = document.getElementById('resizer'), v3d = document.getElementById('view-3d');
                let dragging = false;
                const move = (e) => {
                    if (!dragging) return;
                    const y = e.touches ? e.touches[0].clientY : e.clientY, x = e.touches ? e.touches[0].clientX : e.clientX;
                    if (window.innerWidth >= 768) { let v = (x / window.innerWidth) * 100; if(v > 10 && v < 90) v3d.style.width = v + '%'; }
                    else { let v = (y / window.innerHeight) * 100; if(v > 10 && v < 90) v3d.style.height = v + '%'; }
                    if(App.eyes.map) google.maps.event.trigger(App.eyes.map, 'resize');
                };
                resizer.addEventListener('mousedown', () => dragging = true);
                resizer.addEventListener('touchstart', () => dragging = true);
                window.addEventListener('mousemove', move);
                window.addEventListener('touchmove', move);
                window.addEventListener('mouseup', () => dragging = false);
                window.addEventListener('touchend', () => dragging = false);
            }
        };

        App.eyes = {
            map: null, panorama: null, markers: {},
            init: function() {
                const center = { lat: 44.4268, lng: 26.1025 };
                this.map = new google.maps.Map(document.getElementById('view-2d'), { center, zoom: 17, streetViewControl: true, panControl: true, mapTypeControl: false, zoomControl: true });
                this.panorama = new google.maps.StreetViewPanorama(document.getElementById('view-3d'), { position: center, visible: true, disableDefaultUI: true });
                this.map.setStreetView(this.panorama);

                if(App.state.role === 'guide') {
                    const search = new google.maps.places.Autocomplete(document.getElementById("pac-input"));
                    // Initialize the checking service
                    const svService = new google.maps.StreetViewService();

                    search.addListener("place_changed", () => {
                        const p = search.getPlace();
                        if(!p.geometry) return;
                        const loc = p.geometry.location;

                        // Check for coverage before moving
                        svService.getPanorama({ location: loc, radius: 50 }, (data, status) => {
                            if (status === "OK") {
                                // Coverage exists: Snap to the nearest panorama
                                const svPos = data.location.latLng;
                                this.panorama.setPosition(svPos);
                                this.map.setCenter(svPos);
                                const v = this.panorama.getPov();
                                App.postOffice.transmit({ lat: svPos.lat(), lng: svPos.lng(), h: v.heading, p: v.pitch });
                            } else {
                                // No coverage: Alert and center 2D map for manual Pegman drop
                                this.map.setCenter(loc);
                                this.map.setZoom(17);
                                alert("No Street View found at this precise location. Please manually deploy the Pegman to a nearby blue road!");
                            }
                        });
                    });
                }

                const report = () => {
                    const p = this.panorama.getPosition(), v = this.panorama.getPov();
                    if(!p || App.state.isSyncing) return;
                    this.map.setCenter(p);
                    App.postOffice.db.ref("rooms/"+App.state.room+"/users/"+App.state.id).update({ lat: p.lat(), lng: p.lng(), name: App.state.name, role: App.state.role });
                    if(App.state.role === 'guide') App.postOffice.transmit({ lat: p.lat(), lng: p.lng(), h: v.heading, p: v.pitch });
                };
                this.panorama.addListener('position_changed', report);
                this.panorama.addListener('pov_changed', report);
            }
        };

        App.postOffice = {
            db: null,
            init: function() {
                const config = { databaseURL: "https://virtual-tour-platform-492518-default-rtdb.firebaseio.com" };
                if (!firebase.apps.length) firebase.initializeApp(config);
                this.db = firebase.database();
                this.db.ref("rooms/"+App.state.room+"/users/"+App.state.id).onDisconnect().remove();
                this.db.ref("rooms/"+App.state.room+"/chats").limitToLast(30).on("child_added", s => {
                    const m = s.val(), box = document.getElementById('chat-messages');
                    box.innerHTML += `<div class="msg"><b>${m.sender}:</b> ${m.text}</div>`;
                    box.scrollTop = box.scrollHeight;
                });
                if(App.state.role === 'tourist') {
                    this.db.ref("rooms/"+App.state.room+"/guide").on("value", s => { if(s.val() && App.state.isTethered) this.applyMove(s.val()); });
                }
                this.db.ref("rooms/"+App.state.room+"/users").on("value", s => this.renderUsers(s.val() || {}));
            },
            clearChat: function() { this.db.ref("rooms/"+App.state.room+"/chats").remove(); },
            transmit: function(d) { this.db.ref("rooms/"+App.state.room+"/guide").set(d); },
            applyMove: function(d) {
                App.state.isSyncing = true;
                const loc = {lat: d.lat, lng: d.lng};
                App.eyes.panorama.setPosition(loc);
                App.eyes.panorama.setPov({heading: d.h, pitch: d.p});
                App.eyes.map.setCenter(loc);
                setTimeout(() => App.state.isSyncing = false, 300);
            },
            renderUsers: function(users) {
                const list = document.getElementById('user-list-render');
                let html = "";
                Object.keys(users).forEach(uid => {
                    const u = users[uid];
                    html += `<div>${u.role==='guide'?'👑':'👤'} ${u.name}</div>`;
                    if(uid === App.state.id || !u.lat) return;
                    if(!App.eyes.markers[uid]) {
                        App.eyes.markers[uid] = new google.maps.Marker({
                            map: App.eyes.map,
                            label: { text: u.name, color: "white", fontSize: "11px", fontWeight: "bold" },
                            icon: { path: google.maps.SymbolPath.CIRCLE, scale: 6, fillColor: u.role === 'guide' ? "#ff3333" : "#00d2ff", fillOpacity: 1, strokeWeight: 2, strokeColor: "#fff", labelOrigin: new google.maps.Point(0, -2) }
                        });
                    }
                    App.eyes.markers[uid].setPosition({lat: u.lat, lng: u.lng});
                });
                list.innerHTML = html;
                Object.keys(App.eyes.markers).forEach(mid => { if(!users[mid]) { App.eyes.markers[mid].setMap(null); delete App.eyes.markers[mid]; } });
            }
        };

        App.studio = {
            init: function() {
                const base = "https://travelfromhome.whereby.com/tfh1027277d-1eba-45a2-8f24-33bcddb684b9";
                const common = "&embed&chat=off&info=off&people=off&precall=off&screenshare=off&pip=off";
                const url = App.state.role === 'guide' 
                    ? base + "?roomKey=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJtZWV0aW5nSWQiOiIxMjg3NDEwNTgiLCJyb29tUmVmZXJlbmNlIjp7InJvb21OYW1lIjoiL3RmaDEwMjcyNzdkLTFlYmEtNDVhMi04ZjI0LTMzYmNkZGI2ODRiOSIsIm9yZ2FuaXphdGlvbklkIjoiMzM5NDM0In0sImlzcyI6Imh0dHBzOi8vYWNjb3VudHMuc3J2LndoZXJlYnkuY29tIiwiaWF0IjoxNzc3NDE0NzUwLCJyb29tS2V5VHlwZSI6Im1lZXRpbmdIb3N0In0.HRyWcZbdEIkjtB8DhHVHmlG2cwW_eccYPTM9fkiPna4" + common + "&floatSelf=on"
                    : base + "?" + common + "&video=off&audio=off";
                document.getElementById('wherebyFrame').src = url;
            }
        };
    </script>
</body>
</html>
