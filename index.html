<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNISYNC 4.1.4 | DIRECT</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDU1wim3d3MYf-vvYS4JiCcnW278IaWrVs&libraries=places"></script>
    <style>
        body { font-family: sans-serif; background: #111; color: #fff; margin: 0; text-align: center; }
        .box { padding: 40px 20px; }
        button { padding: 20px; width: 80%; max-width: 300px; border-radius: 10px; border: none; font-weight: bold; margin: 10px; cursor: pointer; }
        #status { font-family: monospace; color: #0f0; margin-top: 20px; font-size: 14px; }
        #main-ui { display: none; height: 100vh; flex-direction: column; }
    </style>
</head>
<body>

    <div id="setup-screen" class="box">
        <h2>OMNISYNC 4.1.4</h2>
        <button style="background:#007bff; color:#fff;" onclick="App.start('receiver')">PC: RECEIVE VIDEO</button>
        <button style="background:#28a745; color:#fff;" onclick="App.start('sender')">PHONE: SEND VIDEO</button>
        <div id="status">System: Waiting for user...</div>
    </div>

    <div id="main-ui">
        <div style="flex:1; position:relative; background:#000;">
            <video id="view" autoplay playsinline muted style="width:100%; height:100%; object-fit:cover;"></video>
            <div id="pano" style="position:absolute; inset:0;"></div>
        </div>
        <div id="map-canvas" style="flex:1;"></div>
    </div>

    <script>
        const App = {
            role: '', db: null, peer: null, stream: null,
            
            start: async function(role) {
                this.role = role;
                document.getElementById('status').innerText = "Connecting...";
                
                // 1. Firebase Init
                const config = { databaseURL: "https://virtual-tour-platform-492518-default-rtdb.firebaseio.com" };
                if (!firebase.apps.length) firebase.initializeApp(config);
                this.db = firebase.database();

                // 2. Peer Init
                this.peer = new Peer({ secure: true });

                this.peer.on('open', (id) => {
                    document.getElementById('status').innerText = "Network Live! ID: " + id;
                    if(this.role === 'receiver') this.db.ref("rooms/TOUR_1/pc_id").set(id);
                    this.launch();
                });

                this.peer.on('error', (err) => {
                    alert("Network Error: " + err.type);
                    console.error(err);
                });

                // 3. Role Logic
                if(this.role === 'sender') {
                    try {
                        this.stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: true });
                        document.getElementById('view').srcObject = this.stream;
                        
                        this.db.ref("rooms/TOUR_1/pc_id").on("value", snap => {
                            if(snap.val()) this.peer.call(snap.val(), this.stream);
                        });
                    } catch (e) { alert("Camera failed: " + e.message); }
                }

                // PC Answer Logic
                this.peer.on('call', call => {
                    call.answer();
                    call.on('stream', s => { 
                        const v = document.getElementById('view');
                        v.srcObject = s; v.muted = false; v.play();
                        v.style.zIndex = 1000; // Put video on top
                    });
                });
            },

            launch: function() {
                document.getElementById('setup-screen').style.display = 'none';
                document.getElementById('main-ui').style.display = 'flex';
                const pos = { lat: 40.758, lng: -73.985 };
                const map = new google.maps.Map(document.getElementById('map-canvas'), { center: pos, zoom: 17 });
                const pano = new google.maps.StreetViewPanorama(document.getElementById('pano'), { position: pos });
                map.setStreetView(pano);
            }
        };
    </script>
</body>
</html>
