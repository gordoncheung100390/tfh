<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNISYNC 4.1.7 | PIXEL-PUSH</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDU1wim3d3MYf-vvYS4JiCcnW278IaWrVs&libraries=places"></script>
    <style>
        :root { --accent: #007bff; --bg: #111; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; overflow: hidden; height: 100dvh; display: flex; flex-direction: column; }
        #setup-screen { position: fixed; inset: 0; background: #222; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        button { padding: 18px 30px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin: 10px; width: 260px; font-size: 16px; }
        #video-container { position: absolute; top: 10px; left: 10px; width: 200px; aspect-ratio: 16/9; background: #000; border: 2px solid var(--accent); z-index: 1000; }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        #status-bar { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); padding: 5px 10px; border-radius: 5px; font-size: 11px; z-index: 1001; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h2 style="color:var(--accent)">OMNISYNC 4.1.7</h2>
        <button style="background:#6c757d; color:white;" onclick="App.start('receiver')">PC: RECEIVE</button>
        <button style="background:var(--accent); color:white;" onclick="App.start('sender')">PHONE: SEND</button>
        <div id="debug-log" style="font-size:12px; color:#888; margin-top:20px;">v4.1.7 Ready</div>
    </div>

    <div id="main-ui" style="display:none; flex:1; flex-direction:column;">
        <div id="view-top" style="flex:1.2; position:relative;">
            <div id="status-bar">Initializing...</div>
            <div id="video-container">
                <video id="view" autoplay playsinline muted></video>
            </div>
            <div id="pano" style="width:100%; height:100%;"></div>
        </div>
        <div id="view-bottom" style="flex:0.8;"><div id="map-canvas" style="width:100%; height:100%;"></div></div>
    </div>

    <script>
        const App = {
            role: '', db: null, peer: null, stream: null,
            start: async function(role) {
                this.role = role;
                const config = { databaseURL: "https://virtual-tour-platform-492518-default-rtdb.firebaseio.com" };
                if (!firebase.apps.length) firebase.initializeApp(config);
                this.db = firebase.database();

                const rand = Math.floor(Math.random() * 999);
                this.peer = new Peer(`OMNI-${role}-${rand}`, { 
                    secure: true,
                    config: { 'iceServers': [{ urls: 'stun:stun1.l.google.com:19302' }] }
                });

                this.peer.on('open', id => {
                    if(this.role === 'receiver') this.db.ref("rooms/TOUR_1/pc_id").set(id);
                    document.getElementById('setup-screen').style.display = 'none';
                    document.getElementById('main-ui').style.display = 'flex';
                    this.initMaps();
                });

                if(this.role === 'sender') {
                    this.stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: true });
                    document.getElementById('view').srcObject = this.stream;
                    this.db.ref("rooms/TOUR_1/pc_id").on("value", snap => {
                        if(snap.val() && this.peer) this.peer.call(snap.val(), this.stream);
                    });
                }

                this.peer.on('call', call => {
                    call.answer();
                    call.on('stream', remoteStream => {
                        const v = document.getElementById('view');
                        v.srcObject = remoteStream;
                        v.muted = true; // PC must start muted to show pixels
                        
                        // Heartbeat: Try to play every second until it works
                        const retry = setInterval(() => {
                            v.play().then(() => {
                                clearInterval(retry);
                                document.getElementById('status-bar').innerText = "LIVE: CLICK TO UNMUTE";
                            }).catch(() => console.log("Blocking autoplay..."));
                        }, 1000);
                    });
                });
            },
            initMaps: function() {
                const pos = { lat: 40.758, lng: -73.985 };
                const map = new google.maps.Map(document.getElementById('map-canvas'), { center: pos, zoom: 17 });
                const pano = new google.maps.StreetViewPanorama(document.getElementById('pano'), { position: pos });
                map.setStreetView(pano);
            }
        };

        // CLICK TO UNMUTE - PC user must click once
        document.addEventListener('click', () => {
            const v = document.getElementById('view');
            if(v && v.srcObject) {
                v.muted = false;
                document.getElementById('status-bar').innerText = "LIVE STREAM ACTIVE";
            }
        });
    </script>
</body>
</html>
