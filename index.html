<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNISYNC | STABLE RELEASE</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDU1wim3d3MYf-vvYS4JiCcnW278IaWrVs&libraries=places"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #00d2ff; --bg: #0a0a0a; --panel: #1a1a1a; --guide: #ffcc00; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow: hidden; }

        /* GATEKEEPER UI */
        #gatekeeper { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .gate-card { background: var(--panel); padding: 40px; border-radius: 12px; text-align: center; border: 1px solid #333; width: 320px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #444; background: #000; color: #fff; box-sizing: border-box; outline: none; }
        .role-selector { display: flex; gap: 10px; margin: 15px 0; }
        .role-btn { flex: 1; padding: 10px; border: 1px solid #444; background: #222; color: #888; cursor: pointer; border-radius: 6px; font-size: 11px; font-weight: bold; }
        .role-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0, 210, 255, 0.1); }

        /* MAIN APP LAYOUT */
        #app-shell { display: none; height: 100vh; width: 100vw; }
        #view-3d { flex: 1; background: #111; position: relative; height: 100%; }
        #view-2d { width: 30%; background: var(--panel); position: relative; border-left: 2px solid #000; height: 100%; }
        #resizer { width: 10px; background: #222; cursor: col-resize; z-index: 100; display: flex; align-items: center; justify-content: center; }
        #resizer::after { content: "||"; color: #444; font-size: 10px; }

        /* OVERLAYS */
        .overlay { position: absolute; z-index: 50; pointer-events: none; }
        .controls { bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; pointer-events: auto; }
        
        #video-feed { top: 20px; right: 20px; width: 240px; height: 135px; background: #000; border-radius: 12px; border: 2px solid #333; overflow: hidden; pointer-events: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.8); z-index: 100; }
        #video-feed video { width: 100%; height: 100%; object-fit: cover; }
        .live-tag { position: absolute; top: 10px; left: 10px; background: red; color: white; padding: 2px 6px; border-radius: 4px; font-size: 8px; font-weight: bold; text-transform: uppercase; z-index: 110; }

        #roster-panel { top: 180px; left: 20px; width: 180px; background: rgba(0,0,0,0.7); border-radius: 10px; border: 1px solid #333; padding: 10px; pointer-events: auto; max-height: 30vh; overflow-y: auto; }
        #search-container { top: 20px; right: 280px; width: 300px; pointer-events: auto; display: none; }
        #pac-input { width: 100%; padding: 12px 15px; border-radius: 8px; border: 1px solid var(--accent); background: #000; color: #fff; font-size: 13px; outline: none; }
        .status-pill { top: 20px; left: 20px; background: rgba(0,0,0,0.85); padding: 10px 15px; border-radius: 10px; font-size: 10px; border: 1px solid #333; min-width: 120px; }
        
        button { background: #fff; color: #000; border: none; padding: 10px 20px; border-radius: 30px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 10px; transition: 0.3s; }
        button.active { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }
    </style>
</head>
<body>

    <div id="gatekeeper">
        <div class="gate-card">
            <h2>OMNISYNC</h2>
            <input type="text" id="room-input" placeholder="Room Code (e.g. ALPHA)">
            <input type="text" id="username-input" placeholder="Your Name">
            <div class="role-selector">
                <div class="role-btn active" id="role-tourist" onclick="App.gatekeeper.setRole('tourist')">TOURIST</div>
                <div class="role-btn" id="role-guide" onclick="App.gatekeeper.setRole('guide')">GUIDE</div>
            </div>
            <button onclick="App.gatekeeper.unlock()" style="width:100%; background: var(--accent);">Initialize</button>
        </div>
    </div>

    <div id="app-shell">
        <div id="view-3d">
            <div class="overlay status-pill">
                <span id="stat-name" style="font-weight: bold; font-size: 12px;">NAME</span><br>
                <span id="stat-role" style="color: #888;">ROLE</span>
            </div>
            <div class="overlay" id="video-feed">
                <div class="live-tag" id="live-indicator">Waiting...</div>
                <video id="remote-video" autoplay playsinline></video>
            </div>
            <div class="overlay" id="roster-panel">
                <div id="user-list"></div>
            </div>
            <div class="overlay" id="search-container">
                <input id="pac-input" type="text" placeholder="Guide Search...">
            </div>
            <div class="overlay controls">
                <button id="tether-btn" onclick="App.brain.toggleTether()">Tethered</button>
                <button id="cam-btn" onclick="App.studio.toggleCam()" style="display:none; background:#333; color:white;">Cam Off</button>
            </div>
        </div>
        <div id="resizer"></div>
        <div id="view-2d"></div>
    </div>

    <script>
        const App = {
            state: { user: { name: "", id: "U" + Date.now(), role: "tourist" }, roomID: "LOBBY", isTethered: true, isSyncing: false },
            init: function() { this.ui.initResizer(); this.postOffice.init(); },
            
            gatekeeper: {
                setRole: function(role) { App.state.user.role = role; document.getElementById('role-tourist').className = role === 'tourist' ? 'role-btn active' : 'role-btn'; document.getElementById('role-guide').className = role === 'guide' ? 'role-btn active' : 'role-btn'; },
                unlock: function() {
                    const name = document.getElementById('username-input').value.trim();
                    const room = document.getElementById('room-input').value.trim().toUpperCase() || "LOBBY";
                    if(!name) return alert("Enter name");
                    App.state.user.name = name; App.state.roomID = room;
                    document.getElementById('gatekeeper').style.display = 'none';
                    document.getElementById('app-shell').style.display = 'flex';
                    document.getElementById('stat-name').innerText = App.state.user.name;
                    document.getElementById('stat-role').innerText = App.state.user.role.toUpperCase() + " | " + room;
                    if(App.state.user.role === 'guide') document.getElementById('cam-btn').style.display = 'block';
                    setTimeout(() => { App.eyes.init(); App.postOffice.checkIn(); App.postOffice.listenForTourists(); App.studio.init(); if(App.state.user.role === 'tourist') App.postOffice.listenForGuide(); }, 200);
                }
            },

            brain: {
                toggleTether: function() {
                    App.state.isTethered = !App.state.isTethered;
                    const btn = document.getElementById('tether-btn');
                    btn.innerText = App.state.isTethered ? "Tethered" : "Roaming";
                    btn.className = App.state.isTethered ? "" : "active";
                    if(App.state.isTethered) {
                        // SNAPPING LOGIC: Move to guide immediately
                        App.postOffice.db.ref("rooms/" + App.state.roomID + "/guide").once("value", (s) => {
                            if(s.val()) App.postOffice.applyMove(s.val());
                        });
                    }
                }
            }
        };

        App.studio = {
            peer: null, localStream: null, camActive: false,
            init: function() {
                const pId = "OMNI-" + App.state.roomID + "-GUIDE";
                this.peer = new Peer(App.state.user.role === 'guide' ? pId : undefined);
                if(App.state.user.role === 'guide') {
                    this.peer.on('call', c => { if(this.localStream) c.answer(this.localStream); });
                } else {
                    // HEARTBEAT: Keep trying to connect until guide is found
                    setInterval(() => { if(!this.camActive) this.connectToGuide(); }, 4000);
                }
            },
            toggleCam: function() {
                if(!this.localStream) {
                    navigator.mediaDevices.getUserMedia({video:true, audio:true}).then(s => {
                        this.localStream = s; document.getElementById('remote-video').srcObject = s;
                        document.getElementById('cam-btn').innerText = "Cam ON"; document.getElementById('cam-btn').style.background = "red";
                        document.getElementById('live-indicator').innerText = "LIVE";
                    });
                } else {
                    this.localStream.getTracks().forEach(t => t.stop()); this.localStream = null;
                    document.getElementById('remote-video').srcObject = null;
                    document.getElementById('cam-btn').innerText = "Cam OFF"; document.getElementById('cam-btn').style.background = "#333";
                    document.getElementById('live-indicator').innerText = "OFFLINE";
                }
            },
            connectToGuide: function() {
                const call = this.peer.call("OMNI-" + App.state.roomID + "-GUIDE", new MediaStream());
                if(!call) return;
                call.on('stream', s => { 
                    document.getElementById('remote-video').srcObject = s; 
                    this.camActive = true; 
                    document.getElementById('live-indicator').innerText = "GUIDE LIVE";
                });
            }
        };

        App.eyes = {
            map: null, panorama: null, markers: {}, 
            init: function() {
                const start = { lat: 40.7580, lng: -73.9855 };
                this.map = new google.maps.Map(document.getElementById('view-2d'), { center: start, zoom: 18, streetViewControl: true, mapTypeControl: false });
                this.panorama = new google.maps.StreetViewPanorama(document.getElementById('view-3d'), { position: start, addressControl: false });
                this.map.setStreetView(this.panorama);
                if(App.state.user.role === 'guide') {
                    document.getElementById('search-container').style.display = 'block';
                    const ac = new google.maps.places.Autocomplete(document.getElementById("pac-input"));
                    ac.addListener("place_changed", () => { const p = ac.getPlace(); if(p.geometry){ this.panorama.setPosition(p.geometry.location); this.map.setCenter(p.geometry.location); } });
                }
                const sync = () => {
                    const p = this.panorama.getPosition(); const v = this.panorama.getPov();
                    if(!App.state.isSyncing && p) {
                        this.map.setCenter(p);
                        if(App.state.user.role === 'guide') App.postOffice.transmit(p.lat(), p.lng(), v.heading, v.pitch);
                        App.postOffice.db.ref("rooms/"+App.state.roomID+"/tourists/"+App.state.user.id).update({lat:p.lat(), lng:p.lng(), name:App.state.user.name, role:App.state.user.role});
                    }
                };
                this.panorama.addListener('position_changed', sync); this.panorama.addListener('pov_changed', sync);
            }
        };

        App.postOffice = {
            db: null,
            init: function() { 
                const config = { apiKey: "AIzaSyBuGMqqCArrL6vKWGRZkgDtn3tvt9wSpoo", databaseURL: "https://virtual-tour-platform-492518-default-rtdb.firebaseio.com" };
                firebase.initializeApp(config); this.db = firebase.database(); 
            },
            checkIn: function() { const r = this.db.ref("rooms/"+App.state.roomID+"/tourists/"+App.state.user.id); r.onDisconnect().remove(); r.set({name:App.state.user.name, role:App.state.user.role, lat:40.7580, lng:-73.9855}); },
            transmit: function(la, ln, h, pi) { this.db.ref("rooms/"+App.state.roomID+"/guide").set({lat:la, lng:ln, heading:h, pitch:pi}); },
            applyMove: function(d) { App.state.isSyncing = true; App.eyes.panorama.setPosition({lat:d.lat, lng:d.lng}); if(d.heading!==undefined) App.eyes.panorama.setPov({heading:d.heading, pitch:d.pitch||0}); setTimeout(()=>App.state.isSyncing=false, 500); },
            listenForGuide: function() { this.db.ref("rooms/"+App.state.roomID+"/guide").on("value", s => { if(s.val() && App.state.isTethered) this.applyMove(s.val()); }); },
            listenForTourists: function() {
                this.db.ref("rooms/"+App.state.roomID+"/tourists").on("value", s => {
                    const us = s.val() || {}; const l = document.getElementById('user-list'); l.innerHTML = "";
                    Object.keys(us).forEach(id => {
                        const u = us[id]; const isMe = id === App.state.user.id;
                        l.innerHTML += `<div style="font-size:12px; margin-bottom:5px;">${u.role==='guide'?'👑':'👤'} ${u.name}</div>`;
                        if(!isMe) {
                            if(!App.eyes.markers[id]) App.eyes.markers[id] = new google.maps.Marker({position:{lat:u.lat, lng:u.lng}, map:App.eyes.map, label:{text:u.name, color: u.role==='guide'?'#ffcc00':'#00d2ff', fontWeight:'bold'}});
                            else App.eyes.markers[id].setPosition({lat:u.lat, lng:u.lng});
                        }
                    });
                });
            }
        };

        App.ui = { initResizer: function() {
            const r = document.getElementById("resizer"); const v = document.getElementById("view-2d");
            r.addEventListener("mousedown", () => { const move = (e) => { v.style.width = (window.innerWidth - e.clientX) + "px"; google.maps.event.trigger(App.eyes.map, "resize"); };
            window.addEventListener("mousemove", move); window.addEventListener("mouseup", () => window.removeEventListener("mousemove", move)); });
        }};

        window.onload = () => App.init();
    </script>
</body>
</html>
