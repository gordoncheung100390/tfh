<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNISYNC 4.1.5 | RESET-CAPABLE</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDU1wim3d3MYf-vvYS4JiCcnW278IaWrVs&libraries=places"></script>

    <style>
        :root { --accent: #007bff; --bg: #111; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; overflow: hidden; height: 100dvh; display: flex; flex-direction: column; }
        
        #setup-screen { position: fixed; inset: 0; background: #222; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        button { padding: 18px 30px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin: 10px; width: 260px; font-size: 16px; }
        .btn-pc { background: #6c757d; color: white; }
        .btn-phone { background: var(--accent); color: white; }

        #main-ui { display: none; flex: 1; flex-direction: column; height: 100%; }
        #view-top { flex: 1.2; position: relative; background: #000; }
        #view-bottom { flex: 0.8; background: #1a1a1a; border-top: 2px solid #000; }

        #video-container { position: absolute; top: 10px; left: 10px; width: 160px; aspect-ratio: 16/9; background: #000; border-radius: 8px; border: 2px solid var(--accent); z-index: 1000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #status-bar { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 5px; font-size: 11px; z-index: 1000; font-family: monospace; }
        #debug-log { margin-top: 20px; font-size: 12px; color: #888; font-family: monospace; text-align: center; max-width: 80%; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h2 style="color:var(--accent)">OMNISYNC 4.1.5</h2>
        <button class="btn-pc" onclick="App.start('receiver')">PC: RECEIVE VIDEO</button>
        <button class="btn-phone" onclick="App.start('sender')">PHONE: SEND VIDEO</button>
        <div id="debug-log">System Ready. Click a role to begin.</div>
    </div>

    <div id="main-ui">
        <div id="view-top">
            <div id="status-bar">Initializing...</div>
            <div id="video-container">
                <video id="view" autoplay playsinline muted></video>
            </div>
            <div id="pano" style="width:100%; height:100%;"></div>
        </div>
        <div id="view-bottom">
            <div id="map-canvas" style="width:100%; height:100%;"></div>
        </div>
    </div>

    <script>
        const log = (msg) => {
            console.log(msg);
            const el = document.getElementById('debug-log');
            if(el) el.innerText = msg;
        };

        const App = {
            role: '', db: null, peer: null, stream: null,
            room: "TOUR_1",

            start: async function(role) {
                // 1. CLEANUP OLD SESSIONS
                if (this.stream) this.stream.getTracks().forEach(t => t.stop());
                if (this.peer) this.peer.destroy();

                this.role = role;
                log("Starting fresh " + role + " session...");

                // 2. FIREBASE INIT
                const config = { databaseURL: "https://virtual-tour-platform-492518-default-rtdb.firebaseio.com" };
                if (!firebase.apps.length) firebase.initializeApp(config);
                this.db = firebase.database();

                // 3. PEERJS INIT (Unique ID per session)
                const rand = Math.floor(Math.random() * 999);
                this.peer = new Peer(`OMNI-${role}-${rand}`, { secure: true });

                this.peer.on('open', (id) => {
                    log("Network Live! ID: " + id);
                    if(this.role === 'receiver') {
                        this.db.ref(`rooms/${this.room}/pc_id`).set(id);
                        document.getElementById('status-bar').innerText = "PC READY: " + id;
                    }
                    this.launch();
                });

                // 4. SENDER (PHONE) LOGIC
                if(this.role === 'sender') {
                    try {
                        this.stream = await navigator.mediaDevices.getUserMedia({ 
                            video: { width: 640, height: 480, facingMode: "environment" }, 
                            audio: true 
                        });
                        document.getElementById('view').srcObject = this.stream;
                        
                        // Watch for PC ID and call
                        this.db.ref(`rooms/${this.room}/pc_id`).on("value", snap => {
                            const target = snap.val();
                            if(target && this.peer) {
                                log("Auto-Calling PC: " + target);
                                this.peer.call(target, this.stream);
                            }
                        });
                    } catch (e) { alert("Camera failed: " + e.message); }
                }

                // 5. RECEIVER (PC) LOGIC
                this.peer.on('call', (call) => {
                    log("Incoming call accepted.");
                    call.answer();
                    call.on('stream', (remoteStream) => {
                        const v = document.getElementById('view');
                        v.srcObject = remoteStream;
                        v.muted = false; // Unmute on PC
                        v.play();
                        document.getElementById('status-bar').innerText = "LIVE STREAM ACTIVE";
                    });
                });

                this.peer.on('error', (err) => log("Peer Error: " + err.type));
            },

            launch: function() {
                document.getElementById('setup-screen').style.display = 'none';
                document.getElementById('main-ui').style.display = 'flex';
                this.initMaps();
            },

            initMaps: function() {
                const pos = { lat: 40.758, lng: -73.985 };
                const map = new google.maps.Map(document.getElementById('map-canvas'), { 
                    center: pos, zoom: 17, disableDefaultUI: true 
                });
                const pano = new google.maps.StreetViewPanorama(document.getElementById('pano'), { 
                    position: pos, addressControl: false 
                });
                map.setStreetView(pano);
            }
        };
    </script>
</body>
</html>
