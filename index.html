<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Broadcast to PC</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #video-container { position: relative; width: 100%; height: 80vh; display: flex; justify-content: center; }
        video { height: 100%; width: auto; border-radius: 15px; background: #222; }
        .ui-layer { position: absolute; bottom: 20px; width: 90%; max-width: 400px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 12px; text-align: center; }
        #my-id { font-size: 0.8em; color: #00d4ff; margin-bottom: 10px; word-break: break-all; }
        input { width: 80%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; border-radius: 5px; border: none; background: #007bff; color: white; font-weight: bold; cursor: pointer; }
        .status-dot { height: 10px; width: 10px; background-color: #bbb; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background-color: #00ff00; }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="main-video" autoplay playsinline></video>
    </div>

    <div class="ui-layer">
        <div id="my-id">Generating ID...</div>
        <div id="status"><span class="status-dot"></span> Waiting for connection...</div>
        <br>
        <input type="text" id="target-id" placeholder="Paste PC ID here on Mobile">
        <button onclick="startBroadcast()">Go Live to PC</button>
    </div>

    <script>
        const mainVideo = document.getElementById('main-video');
        let localStream;

        // Setup Peer with Google STUN servers
        const peer = new Peer({
            config: { 'iceServers': [{ url: 'stun:stun1.l.google.com:19302' }, { url: 'stun:stun2.l.google.com:19302' }] }
        });

        // 1. Initialize Camera and Mic
        async function init() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                // On mobile, show your own face immediately
                mainVideo.srcObject = localStream;
                mainVideo.muted = true; // Mute locally so you don't hear yourself
            } catch (e) {
                alert("Please allow camera/mic access!");
            }
        }

        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = "ID: " + id;
        });

        // 2. PC side: Listen for the incoming mobile stream
        peer.on('call', (call) => {
            document.getElementById('status').innerHTML = '<span class="status-dot online"></span> RECEIVING LIVE FEED';
            call.answer(); // PC doesn't need to send its own camera back
            call.on('stream', (remoteStream) => {
                mainVideo.srcObject = remoteStream;
                mainVideo.muted = false; // PC plays the audio
            });
        });

        // 3. Mobile side: Call the PC
        function startBroadcast() {
            const pcId = document.getElementById('target-id').value;
            if (!pcId) return alert("Enter the PC's ID");

            const call = peer.call(pcId, localStream);
            document.getElementById('status').innerHTML = '<span class="status-dot online"></span> BROADCASTING LIVE';
        }

        init();
    </script>
</body>
</html>
