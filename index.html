<!DOCTYPE html>
<html>
<head>
    <title>BROADCAST 5.3 | STABLE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js" crossorigin="anonymous"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; margin: 0; }
        #video-container { width: 100%; max-width: 500px; aspect-ratio: 16/9; background: #222; margin: 20px auto; border-radius: 12px; overflow: hidden; border: 2px solid #333; }
        video { width: 100%; height: 100%; object-fit: cover; }
        button { padding: 20px; width: 100%; max-width: 300px; font-size: 18px; margin: 10px; cursor: pointer; border: none; border-radius: 10px; font-weight: bold; }
        #status { color: #0f0; margin: 20px; font-family: monospace; font-size: 14px; }
    </style>
</head>
<body>

    <div id="ui">
        <h2>BROADCAST 5.3</h2>
        <button style="background:#007bff; color:#fff;" onclick="start('sender')">PHONE: SEND</button>
        <button style="background:#444; color:#fff;" onclick="start('receiver')">PC: RECEIVE</button>
    </div>

    <div id="status">Ready.</div>
    
    <div id="video-container">
        <video id="v" autoplay playsinline muted></video>
    </div>

    <script>
        const PC_ID = 'omni-stable-bridge-2026';
        let peer;
        const video = document.getElementById('v');
        const status = document.getElementById('status');

        function start(role) {
            document.getElementById('ui').style.display = 'none';
            status.innerText = "Initializing Network...";

            peer = new Peer(role === 'receiver' ? PC_ID : undefined, {
                secure: true,
                config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] }
            });

            peer.on('open', (id) => {
                if(role === 'receiver') {
                    status.innerText = "PC READY: Waiting for connection...";
                } else {
                    sendVideo();
                }
            });

            peer.on('call', (call) => {
                status.innerText = "Incoming Stream...";
                call.answer();
                
                call.on('stream', (s) => {
                    // FIX: Only load the stream if it's not already there
                    if (video.srcObject !== s) {
                        status.innerText = "LIVE: CLICK TO UNMUTE";
                        video.srcObject = s;
                        // Muted by default to prevent the AbortError/Autoplay block
                        video.muted = true; 
                        video.play().catch(e => console.log("Playback pending click..."));
                    }
                });
            });

            peer.on('error', (err) => {
                status.innerText = "Error: " + err.type;
                if(err.type === 'unavailable-id') location.reload(); 
            });
        }

        async function sendVideo() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: true 
                });
                
                // PHONE PREVIEW: Always muted to prevent feedback loop
                video.srcObject = stream;
                video.muted = true; 
                video.play();
                
                status.innerText = "Broadcasting...";
                peer.call(PC_ID, stream);
            } catch (e) {
                status.innerText = "Camera Error: " + e.message;
            }
        }

        // PC Audio Unlock
        document.addEventListener('click', () => {
            if(video.srcObject) {
                video.muted = false;
                status.innerText = "LIVE (AUDIO ACTIVE)";
            }
        });
    </script>
</body>
</html>
