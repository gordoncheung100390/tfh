<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>OMNISYNC 18.2 | RE-SYNC</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; margin: 0; }
        .card { background: #111; padding: 20px; border: 1px solid #333; max-width: 350px; margin: 10px auto; border-radius: 10px; }
        input { width: 80%; padding: 10px; margin: 10px; background: #000; color: #0f0; border: 1px solid #0f0; }
        button { width: 90%; padding: 15px; margin: 5px; cursor: pointer; border: none; font-weight: bold; border-radius: 5px; }
        #log { text-align: left; font-size: 10px; border: 1px solid #222; height: 100px; overflow-y: scroll; margin-top: 10px; padding: 5px; color: #888; }
        #v-wrap { position: relative; width: 100%; max-width: 600px; margin: auto; display: none; }
        video { width: 100%; border: 1px solid #007bff; border-radius: 10px; }
        #audio-notice { position: absolute; top: 10px; left: 10px; background: rgba(255,0,0,0.7); color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="card" id="ui">
    <h3>OMNISYNC 18.2</h3>
    <input type="text" id="room" placeholder="ROOM NAME">
    <button style="background:#222; color:#fff;" onclick="run('PC')">PC (RECEIVE)</button>
    <button style="background:#007bff; color:#fff;" onclick="run('PHONE')">PHONE (SEND)</button>
    <div id="log">System: Ready.</div>
</div>

<div id="v-wrap">
    <video id="v" autoplay playsinline muted></video>
    <div id="audio-notice" onclick="unmute()">🔇 TAP FOR SOUND</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        databaseURL: "YOUR_DATABASE_URL",
        projectId: "YOUR_PROJECT_ID"
    };

    const msg = (t) => {
        const l = document.getElementById('log');
        l.innerHTML += "<br>> " + t;
        l.scrollTop = l.scrollHeight;
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const video = document.getElementById('v');

    function unmute() {
        video.muted = false;
        document.getElementById('audio-notice').style.display = 'none';
        msg("Audio Unmuted.");
    }

    async function run(role) {
        const roomName = document.getElementById('room').value.trim().toLowerCase();
        if(!roomName) return alert("Enter Room!");

        msg("Wiping old session data...");
        // This is the FIX for the 'Blank on Refresh' problem
        await db.ref('rooms/' + roomName).remove(); 

        msg("Starting as " + role);
        const peer = new Peer(role + "-" + roomName, { secure: true });

        peer.on('open', (id) => {
            msg("ID Created: " + id);
            if(role === 'PC') {
                db.ref('rooms/' + roomName).set({ pc_ready: true, ts: Date.now() });
                msg("PC waiting for phone...");
            }
        });

        if(role === 'PC') {
            peer.on('call', c => {
                msg("Incoming Call!");
                c.answer();
                c.on('stream', s => {
                    document.getElementById('ui').style.display = "none";
                    document.getElementById('v-wrap').style.display = "block";
                    video.srcObject = s;
                });
            });
        } else {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
                msg("Camera active.");
                db.ref('rooms/' + roomName).on('value', (snap) => {
                    const data = snap.val();
                    if(data && data.pc_ready) {
                        msg("PC detected. Calling...");
                        peer.call("PC-" + roomName, stream);
                    }
                });
            } catch(e) { msg("Cam Error: " + e.message); }
        }
    }
</script>
</body>
</html>
