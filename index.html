<!DOCTYPE html>
<html>
<head>
    <title>OMNISYNC 8.0 | 5G RELAY</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333; max-width: 350px; margin: auto; }
        input { padding: 15px; width: 80%; font-size: 24px; border-radius: 10px; border: none; text-align: center; margin-bottom: 10px; background: #222; color: #007bff; }
        button { padding: 15px; width: 90%; font-size: 16px; margin: 5px; cursor: pointer; border-radius: 10px; border: none; font-weight: bold; }
        #v-box { width: 100%; max-width: 500px; aspect-ratio: 16/9; background: #000; margin: 20px auto; border-radius: 12px; overflow: hidden; border: 2px solid #333; display: none; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #code-num { font-size: 48px; color: #007bff; font-weight: bold; letter-spacing: 5px; }
    </style>
</head>
<body>

    <div id="setup" class="card">
        <h2>OMNISYNC 8.0</h2>
        <div id="pc-view" style="display:none;">
            <p>PAIRING CODE</p>
            <div id="code-num">----</div>
        </div>
        <div id="phone-view" style="display:none;">
            <input type="number" id="code-input" placeholder="0000">
            <button style="background:#007bff; color:#fff;" onclick="startPhone()">CONNECT (5G)</button>
        </div>
        <div id="selector">
            <button style="background:#333; color:#fff;" onclick="initPC()">PC (RECEIVE)</button>
            <button style="background:#007bff; color:#fff;" onclick="initPhone()">PHONE (SEND)</button>
        </div>
        <div id="status" style="font-size:12px; color:#666; margin-top:10px;">Ready</div>
    </div>

    <div id="v-box">
        <video id="v" autoplay playsinline muted></video>
        <button onclick="unlock()" style="position:absolute; bottom:10px; width:auto; left:50%; transform:translateX(-50%); background:rgba(0,123,255,0.8); color:white; padding:5px 15px;">UNMUTE</button>
    </div>

    <script>
        let peer;
        const status = document.getElementById('status');
        const video = document.getElementById('v');

        // RELAY CONFIG: This is the "magic" that helps 5G
        const iceConfig = {
            'iceServers': [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun.metered.ca:80' }
            ]
        };

        function initPC() {
            const code = Math.floor(1000 + Math.random() * 9000).toString();
            document.getElementById('code-num').innerText = code;
            document.getElementById('selector').style.display = 'none';
            document.getElementById('pc-view').style.display = 'block';

            peer = new Peer('omni-' + code, { config: iceConfig, secure: true });
            peer.on('open', () => status.innerText = "PC Waiting...");
            peer.on('call', (call) => {
                status.innerText = "Signal Found!";
                call.answer();
                call.on('stream', (s) => {
                    document.getElementById('setup').style.display = 'none';
                    document.getElementById('v-box').style.display = 'block';
                    video.srcObject = s;
                    video.play();
                });
            });
        }

        function initPhone() {
            document.getElementById('selector').style.display = 'none';
            document.getElementById('phone-view').style.display = 'block';
        }

        async function startPhone() {
            const code = document.getElementById('code-input').value;
            status.innerText = "Opening 5G Relay...";
            peer = new Peer({ config: iceConfig, secure: true });

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: 480 }, audio: true 
                });
                video.srcObject = stream;
                peer.call('omni-' + code, stream);
                status.innerText = "Broadcasting...";
            } catch (e) { alert("Camera Error"); }
        }

        function unlock() { video.muted = false; }
    </script>
</body>
</html>
