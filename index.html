<!DOCTYPE html>
<html>
<head>
    <title>OMNISYNC 17.2 | STABLE</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js" crossorigin="anonymous"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js" crossorigin="anonymous"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #111; padding: 25px; border-radius: 20px; border: 1px solid #333; max-width: 350px; margin: auto; }
        input { padding: 15px; width: 85%; margin: 10px 0; border-radius: 10px; background: #000; color: #fff; border: 1px solid #444; text-align: center; }
        button { padding: 15px; width: 95%; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin: 5px; }
        #v-container { width: 100%; max-width: 500px; aspect-ratio: 16/9; background: #000; margin: 20px auto; border-radius: 15px; overflow: hidden; border: 2px solid #007bff; display: none; }
        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="setup" class="card">
        <h2>OMNISYNC 17.2</h2>
        <input type="text" id="room-id" placeholder="Room Name">
        <button style="background:#333; color:#fff;" onclick="start('PC')">PC: RECEIVE</button>
        <button style="background:#007bff; color:#fff;" onclick="start('PHONE')">PHONE: SEND</button>
        <p id="status" style="font-size:11px; color:#555; margin-top:10px;">READY</p>
    </div>

    <div id="v-container">
        <video id="v" autoplay playsinline muted></video>
    </div>

    <script>
        // --- YOUR DATA HERE ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            databaseURL: "https://YOUR-PROJECT-ID.europe-west1.firebasedatabase.app",
            projectId: "YOUR-PROJECT-ID"
        };
        // ----------------------

        let db;
        let peer = null; // Initialized as null to avoid the ReferenceError
        const video = document.getElementById('v');

        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
        } catch (e) {
            console.error("Firebase Init Error:", e);
            document.getElementById('status').innerText = "FIREBASE CONFIG ERROR";
        }

        async function start(role) {
            const room = document.getElementById('room-id').value.trim().toLowerCase();
            if(!room) return alert("Enter Room Name");

            document.getElementById('status').innerText = "INITIALIZING PEER...";

            // Initialize peer immediately when button is clicked
            peer = new Peer(role + '-' + room, { 
                config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] },
                secure: true 
            });

            if(role === 'PC') {
                peer.on('open', () => {
                    db.ref('rooms/' + room).set({ pc_ready: true, time: Date.now() });
                    document.getElementById('status').innerText = "WAITING FOR PHONE...";
                });
                peer.on('call', call => {
                    call.answer();
                    call.on('stream', s => handleStream(s));
                });
            } else {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: true });
                    handleStream(stream);
                    db.ref('rooms/' + room).on('value', snap => {
                        if(snap.val()?.pc_ready) {
                            document.getElementById('status').innerText = "CONNECTING...";
                            peer.call('PC-' + room, stream);
                        }
                    });
                } catch(e) { alert("Camera access denied"); }
            }
        }

        function handleStream(s) {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('v-container').style.display = 'block';
            video.srcObject = s;
            video.play().catch(e => console.log("Play interrupted"));
        }
    </script>
</body>
</html>
