<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Broadcast Fix</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #111; color: #fff; text-align: center; margin: 0; padding: 20px; }
        .video-box { width: 100%; max-width: 720px; aspect-ratio: 16/9; background: #000; border-radius: 12px; margin: 20px auto; overflow: hidden; border: 2px solid #333; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .setup-screen { background: #222; padding: 30px; border-radius: 15px; max-width: 400px; margin: 50px auto; }
        button { padding: 15px 25px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin: 10px; }
        .btn-phone { background: #007bff; color: white; }
        .btn-pc { background: #6c757d; color: white; }
        .btn-start { background: #28a745; color: white; width: 100%; }
        #unmute-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
        input { padding: 12px; border-radius: 5px; border: 1px solid #444; background: #000; color: #fff; width: 80%; margin-bottom: 15px; }
        #peer-id-display { color: #00d4ff; font-weight: bold; font-family: monospace; font-size: 1.4em; margin: 15px; padding: 10px; background: #000; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="setup-screen" class="setup-screen">
        <h2>Who are you?</h2>
        <button class="btn-phone" onclick="setRole('sender')">I am the PHONE</button>
        <button class="btn-pc" onclick="setRole('receiver')">I am the PC</button>
    </div>

    <div id="main-ui" style="display:none;">
        <h2 id="role-title">Live Stream</h2>
        
        <div class="video-box">
            <div id="unmute-overlay">
                <p>Stream Received!</p>
                <button onclick="forcePlay()" style="background: #ffc107; color: #000;">CLICK TO WATCH & HEAR</button>
            </div>
            <video id="view" autoplay playsinline></video>
        </div>

        <div id="pc-area" style="display:none;">
            <p>PC ID (Give this to Phone):</p>
            <div id="peer-id-display">Connecting...</div>
        </div>

        <div id="phone-area" style="display:none;">
            <input type="text" id="target-id" placeholder="Paste PC ID here">
            <button class="btn-start" onclick="startBroadcast()">START BROADCASTING</button>
        </div>
    </div>

    <script>
        let role = '';
        let localStream;
        const videoElem = document.getElementById('view');
        const overlay = document.getElementById('unmute-overlay');
        
        const peer = new Peer({
            config: { 'iceServers': [{ url: 'stun:stun1.l.google.com:19302' }, { url: 'stun:stun2.l.google.com:19302' }] }
        });

        function setRole(selectedRole) {
            role = selectedRole;
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';

            if (role === 'sender') {
                document.getElementById('phone-area').style.display = 'block';
                setupCamera();
            } else {
                document.getElementById('pc-area').style.display = 'block';
            }
        }

        async function setupCamera() {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            videoElem.srcObject = localStream;
            videoElem.muted = true;
        }

        peer.on('open', (id) => {
            document.getElementById('peer-id-display').innerText = id;
        });

        function startBroadcast() {
            const targetId = document.getElementById('target-id').value;
            peer.call(targetId, localStream);
            alert("Broadcast active!");
        }

        // PC RECEIVER LOGIC
        peer.on('call', (call) => {
            call.answer(); 
            call.on('stream', (remoteStream) => {
                videoElem.srcObject = remoteStream;
                overlay.style.display = 'flex'; // Show the "Click to watch" button
            });
        });

        function forcePlay() {
            videoElem.muted = false; // Enable audio
            videoElem.play();        // Force video start
            overlay.style.display = 'none';
        }
    </script>
</body>
</html>
