<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Cam Stream - Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; background: #0f0f0f; color: #e0e0e0; margin: 0; padding: 20px; }
        h2 { color: #00d4ff; margin-bottom: 10px; }
        #my-id { background: #252525; padding: 10px 15px; border-radius: 5px; border-left: 4px solid #00d4ff; margin-bottom: 20px; font-family: monospace; cursor: pointer; }
        video { width: 100%; max-width: 640px; border-radius: 12px; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .controls { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 400px; margin-bottom: 20px; }
        input { padding: 12px; border-radius: 6px; border: 1px solid #444; background: #1a1a1a; color: white; outline: none; }
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border-radius: 6px; border: none; background: #007bff; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #0056b3; }
        .flip-btn { background: #28a745; }
        #local-video { width: 120px; position: fixed; bottom: 20px; right: 20px; border: 2px solid #00d4ff; z-index: 10; }
    </style>
</head>
<body>

    <h2>Remote Stream</h2>
    
    <div id="my-id">Loading ID...</div>

    <div class="controls">
        <input type="text" id="remote-id" placeholder="Enter Laptop ID">
        <div class="btn-group">
            <button onclick="connectToPeer()">Connect</button>
            <button class="flip-btn" onclick="toggleCamera()">Flip Cam</button>
        </div>
    </div>

    <video id="remote-video" autoplay playsinline></video>
    <video id="local-video" autoplay playsinline muted></video>

    <script>
        let currentFacingMode = 'user'; 
        let localStream;
        
        // Peer config with Google's STUN servers for cross-network stability
        const peer = new Peer({
            config: {
                'iceServers': [
                    { url: 'stun:stun1.l.google.com:19302' },
                    { url: 'stun:stun2.l.google.com:19302' }
                ]
            }
        });

        async function startCamera(facingMode = 'user') {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: facingMode }, 
                    audio: true 
                });
                document.getElementById('local-video').srcObject = localStream;
            } catch (err) {
                console.error("Camera access denied:", err);
            }
        }

        function toggleCamera() {
            currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
            startCamera(currentFacingMode);
        }

        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = "Your ID: " + id;
        });

        peer.on('call', (call) => {
            call.answer(localStream);
            call.on('stream', (remoteStream) => {
                document.getElementById('remote-video').srcObject = remoteStream;
            });
        });

        function connectToPeer() {
            const remoteId = document.getElementById('remote-id').value;
            if (!remoteId) return alert("Enter an ID first!");

            const call = peer.call(remoteId, localStream);
            call.on('stream', (remoteStream) => {
                document.getElementById('remote-video').srcObject = remoteStream;
            });
        }

        // Initialize camera on load
        startCamera();
    </script>
</body>
</html>
