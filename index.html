<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNISYNC | FINAL STABLE</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDU1wim3d3MYf-vvYS4JiCcnW278IaWrVs&libraries=places"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <style>
        :root { --accent: #00d2ff; --bg: #0a0a0a; --panel: #1a1a1a; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow: hidden; }

        /* GATEKEEPER */
        #gatekeeper { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .gate-card { background: var(--panel); padding: 40px; border-radius: 12px; text-align: center; border: 1px solid #333; width: 320px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #444; background: #000; color: #fff; box-sizing: border-box; outline: none; }
        
        /* APP LAYOUT */
        #app-shell { display: none; height: 100vh; width: 100vw; }
        #view-3d { flex: 1; background: #111; position: relative; height: 100%; }
        #view-2d { width: 30%; background: var(--panel); border-left: 2px solid #000; }
        
        /* WEBCAM BOX (The Fix) */
        #video-container { position: absolute; top: 20px; right: 20px; width: 280px; aspect-ratio: 16/9; background: #000; border-radius: 12px; border: 2px solid var(--accent); overflow: hidden; z-index: 1000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #unmute-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1010; }
        
        /* BUTTONS */
        .controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; gap: 10px; }
        button { background: #fff; color: #000; border: none; padding: 10px 20px; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 10px; }
        button.active { background: var(--accent); }
    </style>
</head>
<body>

    <div id="gatekeeper">
        <div class="gate-card">
            <h2>OMNISYNC</h2>
            <input type="text" id="room-input" placeholder="Room Code">
            <input type="text" id="username-input" placeholder="Your Name">
            <p style="font-size: 10px; color: #666;">Select Device Role:</p>
            <button onclick="launch('guide')" style="background: var(--accent); width: 100%; margin-bottom: 5px;">I am the PHONE (Guide)</button>
            <button onclick="launch('tourist')" style="background: #333; color: #fff; width: 100%;">I am the PC (Tourist)</button>
        </div>
    </div>

    <div id="app-shell">
        <div id="view-3d">
            <div id="video-container">
                <div id="unmute-overlay">
                    <button onclick="forcePlay()" style="background: var(--accent);">CLICK TO START CAM</button>
                </div>
                <video id="cam-view" autoplay playsinline></video>
            </div>
            
            <div class="controls">
                <button id="tether-btn" onclick="toggleTether()">Tethered</button>
            </div>
        </div>
        <div id="view-2d"></div>
    </div>

    <script>
        let peer, localStream, role;
        const state = { isTethered: true, room: "", name: "" };

        // 1. INITIALIZE APP
        function launch(selectedRole) {
            role = selectedRole;
            state.room = document.getElementById('room-input').value.toUpperCase() || "LOBBY";
            state.name = document.getElementById('username-input').value || "User";
            
            document.getElementById('gatekeeper').style.display = 'none';
            document.getElementById('app-shell').style.display = 'flex';
            
            initMaps();
            initFirebase();
            initPeer();
        }

        // 2. PEERJS LOGIC (THE FIX)
        function initPeer() {
            // Use Room Code as the ID for the PC so Phone can find it
            const myId = (role === 'tourist') ? "OMNI-" + state.room : null;
            peer = new Peer(myId, { debug: 1 });

            peer.on('open', (id) => {
                if (role === 'guide') setupGuideCamera();
            });

            // PC Receiver Logic
            peer.on('call', (call) => {
                call.answer();
                call.on('stream', (remoteStream) => {
                    const v = document.getElementById('cam-view');
                    v.srcObject = remoteStream;
                    document.getElementById('unmute-overlay').style.display = 'flex';
                });
            });
        }

        async function setupGuideCamera() {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('cam-view').srcObject = localStream;
            document.getElementById('cam-view').muted = true;
            
            // Auto-call the PC
            const targetId = "OMNI-" + state.room;
            peer.call(targetId, localStream);
        }

        function forcePlay() {
            const v = document.getElementById('cam-view');
            v.muted = false;
            v.play();
            document.getElementById('unmute-overlay').style.display = 'none';
        }

        // 3. MAPS & FIREBASE SYNC (Existing Logic)
        let map, panorama, db;
        function initFirebase() {
            const config = { apiKey: "AIzaSyBuGMqqCArrL6vKWGRZkgDtn3tvt9wSpoo", databaseURL: "https://virtual-tour-platform-492518-default-rtdb.firebaseio.com" };
            if (!firebase.apps.length) firebase.initializeApp(config);
            db = firebase.database();
            
            if (role === 'tourist') {
                db.ref("rooms/" + state.room + "/pos").on("value", s => {
                    if (s.val() && state.isTethered) {
                        panorama.setPosition({lat: s.val().lat, lng: s.val().lng});
                        panorama.setPov({heading: s.val().h, pitch: s.val().p});
                    }
                });
            }
        }

        function initMaps() {
            const pos = { lat: 40.758, lng: -73.985 };
            map = new google.maps.Map(document.getElementById('view-2d'), { center: pos, zoom: 15 });
            panorama = new google.maps.StreetViewPanorama(document.getElementById('view-3d'), { position: pos });
            map.setStreetView(panorama);

            panorama.addListener('status_changed', () => {
                if (role === 'guide') {
                    const p = panorama.getPosition();
                    const v = panorama.getPov();
                    db.ref("rooms/" + state.room + "/pos").set({ lat: p.lat(), lng: p.lng(), h: v.heading, p: v.pitch });
                }
            });
        }

        function toggleTether() {
            state.isTethered = !state.isTethered;
            document.getElementById('tether-btn').innerText = state.isTethered ? "Tethered" : "Roaming";
            document.getElementById('tether-btn').classList.toggle('active');
        }
    </script>
</body>
</html>
