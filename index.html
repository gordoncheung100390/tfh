<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Cam Stream</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #121212; color: white; }
        video { width: 90%; max-width: 600px; border-radius: 10px; background: #000; margin-top: 20px; border: 2px solid #333; }
        .controls { margin-top: 20px; padding: 20px; background: #1e1e1e; border-radius: 8px; }
        input { padding: 10px; border-radius: 4px; border: none; }
        button { padding: 10px 20px; border-radius: 4px; border: none; background: #007bff; color: white; cursor: pointer; }
        button:hover { background: #0056b3; }
        .status { color: #00ff00; font-weight: bold; margin: 10px; }
    </style>
</head>
<body>

    <h2>P2P Video Stream</h2>
    
    <div class="status" id="my-id">Initializing ID...</div>

    <div class="controls">
        <input type="text" id="remote-id" placeholder="Paste Remote ID here">
        <button onclick="connectToPeer()">Connect & Stream</button>
    </div>

    <video id="remote-video" autoplay playsinline></video>
    <video id="local-video" autoplay playsinline muted style="width: 150px; margin-top: 10px;"></video>

    <script>
        const peer = new Peer(); // Creates a new PeerJS instance
        let localStream;

        // 1. Get user media (Camera)
        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
            .then(stream => {
                localStream = stream;
                document.getElementById('local-video').srcObject = stream;
            })
            .catch(err => console.error("Failed to get local stream", err));

        // 2. Display your unique ID
        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = "Your ID: " + id;
        });

        // 3. Handle incoming calls (When phone calls laptop)
        peer.on('call', (call) => {
            call.answer(localStream); // Answer with your stream
            call.on('stream', (remoteStream) => {
                document.getElementById('remote-video').srcObject = remoteStream;
            });
        });

        // 4. Function to start the call (From phone to laptop)
        function connectToPeer() {
            const remoteId = document.getElementById('remote-id').value;
            if (!remoteId) return alert("Please enter an ID");

            const call = peer.call(remoteId, localStream);
            call.on('stream', (remoteStream) => {
                document.getElementById('remote-video').srcObject = remoteStream;
            });
        }
    </script>
</body>
</html>
