<!DOCTYPE html>
<html>
<head>
    <title>OMNISYNC | FORCE CONNECT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.4.7/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #050505; color: white; padding-top: 50px; }
        .box { background: #111; padding: 30px; border-radius: 15px; border: 1px solid #333; display: inline-block; }
        video { width: 480px; height: 360px; background: #000; border: 2px solid #00d2ff; border-radius: 10px; margin-top: 20px; object-fit: cover; }
        input { padding: 12px; border-radius: 5px; border: 1px solid #444; background: #000; color: #fff; width: 220px; }
        button { padding: 12px 25px; cursor: pointer; font-weight: bold; border-radius: 5px; border: none; margin: 5px; }
        .g-btn { background: #ff4b2b; color: white; }
        .t-btn { background: #00d2ff; color: black; }
        #status { margin-top: 15px; color: #00d2ff; }
    </style>
</head>
<body>

    <div class="box">
        <h2>OMNISYNC PUNCH-THROUGH</h2>
        <input type="text" id="room-code" placeholder="ENTER ROOM CODE">
        <br>
        <button class="g-btn" onclick="init('guide')">GUIDE</button>
        <button class="t-btn" onclick="init('tourist')">TOURIST</button>
        <div id="status">READY</div>
        <br>
        <video id="vid" autoplay playsinline></video>
    </div>

    <script>
        let peer = null;
        let localStream = null;

        async function init(role) {
            const room = document.getElementById('room-code').value.toUpperCase().trim();
            if(!room) return alert("Enter Code!");

            const status = document.getElementById('status');
            const gID = "ROOM-" + room + "-GUIDE";

            // STUN/TURN configuration to bypass Firewalls
            const config = {
                'iceServers': [
                    { 'urls': 'stun:stun.l.google.com:19302' },
                    { 'urls': 'stun:stun1.l.google.com:19302' },
                    { 'urls': 'stun:stun2.l.google.com:19302' }
                ]
            };

            peer = new Peer(role === 'guide' ? gID : null, {
                secure: true,
                port: 443,
                config: config,
                debug: 2
            });

            peer.on('open', (id) => {
                status.innerText = "ONLINE - " + role.toUpperCase();
                if(role === 'guide') startGuide();
                else status.innerText = "READY: CLICK TO CONNECT";
            });

            // TOURIST CLICK ACTION
            window.onclick = () => {
                if(peer && !peer.destroyed && !localStream) {
                    status.innerText = "ATTEMPTING HANDSHAKE...";
                    const call = peer.call(gID, new MediaStream());
                    
                    call.on('stream', s => {
                        status.innerText = "CONNECTED!";
                        const v = document.getElementById('vid');
                        v.srcObject = s;
                        v.play();
                    });

                    // Error handling for the specific call
                    setTimeout(() => {
                        if(status.innerText === "ATTEMPTING HANDSHAKE...") {
                            status.innerText = "STILL TRYING... (Possible Firewall)";
                        }
                    }, 5000);
                }
            };
        }

        async function startGuide() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
                document.getElementById('vid').srcObject = localStream;
                document.getElementById('vid').muted = true;
                
                peer.on('call', call => {
                    console.log("Receiving call...");
                    call.answer(localStream);
                });
            } catch(e) { alert("Cam Blocked"); }
        }
    </script>
</body>
</html>
