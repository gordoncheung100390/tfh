<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMNISYNC</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDU1wim3d3MYf-vvYS4JiCcnW278IaWrVs&libraries=places"></script>

<style>
body,html{margin:0;height:100%;background:#0a0a0a;color:#fff;font-family:sans-serif}
#gatekeeper{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
input{width:100%;padding:10px;margin:5px 0;background:#000;color:#fff;border:1px solid #333}
button{padding:10px 20px;border:none;background:#00d2ff;color:#000;cursor:pointer}
#app{display:none;height:100vh}
#view3d{flex:1}
#view2d{width:30%}
</style>
</head>

<body>

<div id="gatekeeper">
<div>
<h2>OMNISYNC</h2>
<input id="name" placeholder="Name">
<input id="room" placeholder="Room">
<button id="start">Start</button>
</div>
</div>

<div id="app">
<div id="view3d"></div>
<div id="view2d"></div>
</div>

<script>
const EventBus={
events:{},
on(e,h){(this.events[e]||(this.events[e]=[])).push(h)},
emit(e,d){(this.events[e]||[]).forEach(h=>h(d))}
};

const State={
user:{id:"U"+Date.now(),name:"",role:"tourist"},
room:"LOBBY",
tether:true,
sync:false
};

const MapModule={
map:null,panorama:null,
init(){
const s={lat:40.758,lng:-73.985};

this.map=new google.maps.Map(view2d,{center:s,zoom:18});
this.panorama=new google.maps.StreetViewPanorama(view3d,{position:s});
this.map.setStreetView(this.panorama);

let t=0;
const sync=()=>{
if(Date.now()-t<100)return;t=Date.now();
const p=this.panorama.getPosition();
const v=this.panorama.getPov();
if(!State.sync){
EventBus.emit("move",{lat:p.lat(),lng:p.lng(),h:v.heading,p:v.pitch});
}
};

this.panorama.addListener("position_changed",sync);
this.panorama.addListener("pov_changed",sync);

EventBus.on("guide",d=>{
if(State.tether&&d){
State.sync=true;
this.panorama.setPosition({lat:d.lat,lng:d.lng});
this.panorama.setPov({heading:d.h,pitch:d.p||0});
setTimeout(()=>State.sync=false,300);
}
});
}
};

const SyncModule={
db:null,
init(){
firebase.initializeApp({
apiKey:"AIzaSyBuGMqqCArrL6vKWGRZkgDtn3tvt9wSpoo",
databaseURL:"https://virtual-tour-platform-492518-default-rtdb.firebaseio.com"
});
this.db=firebase.database();

EventBus.on("move",d=>{
const base="rooms/"+State.room;

this.db.ref(base+"/tourists/"+State.user.id).set({
name:State.user.name,lat:d.lat,lng:d.lng
});

if(State.user.role==="guide"){
this.db.ref(base+"/guide").set(d);
}
});
},
start(){
const base="rooms/"+State.room;

this.db.ref(base+"/guide").on("value",s=>{
EventBus.emit("guide",s.val());
});
}
};

document.getElementById("start").onclick=()=>{
State.user.name=name.value;
State.room=room.value||"LOBBY";

gatekeeper.style.display="none";
app.style.display="flex";

MapModule.init();
SyncModule.init();
SyncModule.start();
};
</script>

</body>
</html>
