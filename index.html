<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNISYNC | CAM BYPASS</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.4.7/peerjs.min.js"></script>
    
    <style>
        body { 
            background: #050505; color: #fff; font-family: sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; 
        }
        #ui-layer { background: #111; padding: 30px; border-radius: 15px; border: 1px solid #222; text-align: center; }
        video { 
            width: 90vw; max-width: 600px; border-radius: 10px; border: 2px solid #00d2ff; 
            background: #000; display: none; margin-top: 20px;
        }
        input { padding: 12px; border-radius: 5px; border: 1px solid #333; background: #000; color: #fff; width: 200px; margin-bottom: 10px; }
        button { padding: 12px 20px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; margin: 5px; }
        .guide-btn { background: #ff4b2b; color: #fff; }
        .tourist-btn { background: #00d2ff; color: #000; }
        #status { margin-top: 15px; font-size: 12px; color: #00d2ff; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h2>OMNISYNC CAM</h2>
        <input type="text" id="room-id" placeholder="ROOM CODE (e.g. TEST1)">
        <br>
        <button class="guide-btn" onclick="start('guide')">GUIDE (Start Cam)</button>
        <button class="tourist-btn" onclick="start('tourist')">TOURIST (Join)</button>
        <div id="status">READY</div>
    </div>

    <video id="vid" autoplay playsinline></video>

    <script>
        let peer = null;
        let stream = null;

        async function start(role) {
            const room = document.getElementById('room-id').value.trim().toUpperCase();
            if(!room) return alert("Enter Room Code");

            const status = document.getElementById('status');
            const video = document.getElementById('vid');
            
            // Generate a random ID for the session to bypass the "Tracking Prevention" storage block
            const randomID = "USER-" + Math.floor(Math.random() * 10000);
            const guideID = "OMNI-" + room + "-GUIDE";

            // Initialize Peer with explicit secure settings for GitHub
            peer = new Peer(role === 'guide' ? guideID : randomID, {
                secure: true,
                port: 443,
                debug: 3 // High debug to see if storage is blocked in console
            });

            peer.on('open', id => {
                status.innerText = "CONNECTED AS " + role.toUpperCase();
                document.getElementById('ui-layer').style.display = 'none';
                video.style.display = 'block';

                if(role === 'guide') {
                    setupGuide();
                } else {
                    setupTourist(guideID);
                }
            });

            peer.on('error', err => {
                console.error(err);
                status.innerText = "ERROR: " + err.type;
                if(err.type === 'unavailable-id') alert("Guide ID busy. Wait 30s or use new code.");
            });
        }

        async function setupGuide() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('vid').srcObject = stream;
                document.getElementById('vid').muted = true;

                peer.on('call', call => {
                    console.log("Tourist calling... answering.");
                    call.answer(stream);
                });
            } catch (e) {
                alert("Camera Error. Please check HTTPS and permissions.");
            }
        }

        function setupTourist(target) {
            document.getElementById('status').innerText = "CLICK SCREEN TO START VIDEO";
            
            // This listener is CRITICAL. Browsers block video until a click happens.
            window.onclick = () => {
                const call = peer.call(target, new MediaStream());
                
                call.on('stream', remoteStream => {
                    const v = document.getElementById('vid');
                    v.srcObject = remoteStream;
                    v.play();
                });
            };
        }
    </script>
</body>
</html>
