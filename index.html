<!DOCTYPE html>
<html>
<head>
    <title>OMNISYNC 14 | 100% RELAY</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #333; max-width: 350px; margin: auto; }
        #code-display { font-size: 50px; color: #007bff; font-weight: bold; margin: 15px; }
        input { padding: 15px; width: 80%; font-size: 24px; border-radius: 10px; margin-bottom: 10px; text-align: center; }
        button { padding: 15px; width: 95%; font-size: 16px; margin: 5px; cursor: pointer; border-radius: 10px; border: none; font-weight: bold; }
        video { width: 100%; max-width: 500px; aspect-ratio: 16/9; background: #000; margin-top: 20px; border: 2px solid #007bff; display: none; }
    </style>
</head>
<body>
    <div id="setup" class="card">
        <h2>OMNISYNC 14</h2>
        <div id="pc-ui" style="display:none;">
            <p>PAIRING CODE:</p>
            <div id="code-display">----</div>
        </div>
        <div id="phone-ui" style="display:none;">
            <input type="number" id="input-code" placeholder="0000">
            <button style="background:#007bff; color:#fff;" onclick="startPhone()">FORCE CONNECT</button>
        </div>
        <div id="selector">
            <button style="background:#333; color:#fff;" onclick="initPC()">PC (RECEIVE)</button>
            <button style="background:#007bff; color:#fff;" onclick="initPhone()">PHONE (SEND)</button>
        </div>
        <p id="status" style="font-size:12px; color:#555;">Ready</p>
    </div>
    <video id="v" autoplay playsinline muted></video>

    <script>
        let peer;
        const video = document.getElementById('v');
        const status = document.getElementById('status');

        // This config is the "Google Way" - it uses a relay server as a bridge
        const relayConfig = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { 
                    urls: 'turn:standard.relay.metered.ca:443', 
                    username: 'openrelayproject', 
                    credential: 'openrelayproject' 
                }
            ],
            iceTransportPolicy: 'relay' // This FORCES the use of the middleman
        };

        function initPC() {
            const code = Math.floor(1000 + Math.random() * 9000).toString();
            document.getElementById('code-display').innerText = code;
            document.getElementById('selector').style.display = 'none';
            document.getElementById('pc-ui').style.display = 'block';

            peer = new Peer('omni-14-' + code, { config: relayConfig, secure: true });
            peer.on('call', (call) => {
                call.answer();
                call.on('stream', (s) => {
                    document.getElementById('setup').style.display = 'none';
                    video.style.display = 'block';
                    video.srcObject = s;
                    video.play();
                });
            });
        }

        function initPhone() {
            document.getElementById('selector').style.display = 'none';
            document.getElementById('phone-ui').style.display = 'block';
        }

        async function startPhone() {
            const code = document.getElementById('input-code').value;
            peer = new Peer({ config: relayConfig, secure: true });
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: true });
                video.style.display = 'block';
                video.srcObject = stream;
                peer.call('omni-14-' + code, stream);
                status.innerText = "Connected to Bridge...";
            } catch (e) { alert("Camera Error"); }
        }
    </script>
</body>
</html>
