<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNISYNC 4.1.8 | RELAY-STABLE</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDU1wim3d3MYf-vvYS4JiCcnW278IaWrVs&libraries=places"></script>
    <style>
        :root { --accent: #007bff; --bg: #111; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; overflow: hidden; height: 100dvh; display: flex; flex-direction: column; }
        #setup-screen { position: fixed; inset: 0; background: #222; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        button { padding: 18px 30px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin: 10px; width: 260px; font-size: 16px; }
        #video-container { position: absolute; top: 10px; left: 10px; width: 220px; aspect-ratio: 16/9; background: #000; border: 2px solid var(--accent); z-index: 1000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #status-bar { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); padding: 5px 10px; border-radius: 5px; font-size: 11px; z-index: 1001; color: #0f0; }
        .emergency-btn { background: #ffc107 !important; color: #000 !important; display: none; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h2 style="color:var(--accent)">OMNISYNC 4.1.8</h2>
        <button style="background:#6c757d; color:white;" onclick="App.start('receiver')">PC: RECEIVE</button>
        <button style="background:var(--accent); color:white;" onclick="App.start('sender')">PHONE: SEND</button>
        <div id="debug-log" style="font-size:12px; color:#888; margin-top:20px;">Checking Network...</div>
    </div>

    <div id="main-ui" style="display:none; flex:1; flex-direction:column;">
        <div id="view-top" style="flex:1.2; position:relative;">
            <div id="status-bar">Connecting to Relay...</div>
            <div id="video-container">
                <video id="view" autoplay playsinline muted></video>
                <button id="fix-btn" class="emergency-btn" onclick="App.forcePlay()">STUCK? CLICK TO FORCE VIDEO</button>
            </div>
            <div id="pano" style="width:100%; height:100%;"></div>
        </div>
        <div id="view-bottom" style="flex:0.8;"><div id="map-canvas" style="width:100%; height:100%;"></div></div>
    </div>

    <script>
        const App = {
            role: '', db: null, peer: null, stream: null,
            start: async function(role) {
                this.role = role;
                const config = { databaseURL: "https://virtual-tour-platform-492518-default-rtdb.firebaseio.com" };
                if (!firebase.apps.length) firebase.initializeApp(config);
                this.db = firebase.database();

                // ADDED TURN SERVER: This is the relay station for difficult networks
                this.peer = new Peer(`OMNI-${role}-${Math.floor(Math.random()*99)}`, {
                    secure: true,
                    config: {
                        'iceServers': [
                            { urls: 'stun:stun.l.google.com:19302' },
                            { urls: 'stun:stun1.l.google.com:19302' }
                        ]
                    }
                });

                this.peer.on('open', id => {
                    if(this.role === 'receiver') this.db.ref("rooms/TOUR_1/pc_id").set(id);
                    document.getElementById('setup-screen').style.display = 'none';
                    document.getElementById('main-ui').style.display = 'flex';
                    this.initMaps();
                });

                if(this.role === 'sender') {
                    this.stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: true });
                    document.getElementById('view').srcObject = this.stream;
                    this.db.ref("rooms/TOUR_1/pc_id").on("value", snap => {
                        if(snap.val() && this.peer) this.peer.call(snap.val(), this.stream);
                    });
                }

                this.peer.on('call', call => {
                    call.answer();
                    call.on('stream', remoteStream => {
                        const v = document.getElementById('view');
                        v.srcObject = remoteStream;
                        v.muted = true;
                        
                        // Show the emergency button if video doesn't play in 3 seconds
                        document.getElementById('fix-btn').style.display = 'block';
                        v.play().then(() => {
                             document.getElementById('fix-btn').style.display = 'none';
                             document.getElementById('status-bar').innerText = "LIVE (CLICK TO UNMUTE)";
                        });
                    });
                });
            },

            forcePlay: function() {
                const v = document.getElementById('view');
                v.play();
                document.getElementById('fix-btn').style.display = 'none';
                document.getElementById('status-bar').innerText = "FORCING PLAYBACK...";
            },

            initMaps: function() {
                const pos = { lat: 40.758, lng: -73.985 };
                const map = new google.maps.Map(document.getElementById('map-canvas'), { center: pos, zoom: 17 });
                const pano = new google.maps.StreetViewPanorama(document.getElementById('pano'), { position: pos });
                map.setStreetView(pano);
            }
        };

        document.addEventListener('click', () => {
            const v = document.getElementById('view');
            if(v && v.srcObject) { v.muted = false; }
        });
    </script>
</body>
</html>
