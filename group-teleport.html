<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GROUP TELEPORT | OMNISYNC 6.6</title>
    
    <script>
      (g=>{var h,a,k,p="The Google Maps JavaScript API",c="google",l="importLibrary",q="__ib__",m=document,b=window;b=b[c]||(b[c]={});var d=b.maps||(b.maps={}),r=new Set,e=new URLSearchParams,u=()=>h||(h=new Promise(async(f,n)=>{await (a=m.createElement("script"));e.set("libraries",[...r]+"");for(k in g)e.set(k.replace(/[A-Z]/g,t=>"_"+t[0].toLowerCase()),g[k]);e.set("callback",c+".maps."+q);a.src=`https://maps.${c}apis.com/maps/api/js?`+e;d[q]=f;a.onerror=()=>h=n(Error(p+" could not load."));a.nonce=m.querySelector("script[nonce]")?.nonce||"";m.head.append(a)}));d[l]?console.warn(p+" only loads once. Re-trying:",g):d[l]=(f,...n)=>r.add(f)&&u().then(()=>d[l](f,...n))})({
        key: "AIzaSyDU1wim3d3MYf-vvYS4JiCcnW278IaWrVs",
        v: "weekly"
      });
    </script>
    
    <script crossorigin src="https://unpkg.com/@daily-co/daily-js"></script>
    
    <style>
        :root { --accent: #00d2ff; --bg: #0a0a0a; --panel: #1a1a1a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100dvh; width: 100vw; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }

        /* GATEKEEPER / LOGIN SCREEN */
        #gatekeeper { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .gate-card { background: var(--panel); padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #333; width: 100%; max-width: 350px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #444; background: #000; color: #fff; font-size: 16px; outline: none; }

        /* MAIN APP LAYOUT */
        #app-shell { display: none; height: 100dvh; width: 100vw; flex-direction: column; }
        #view-3d { height: 50%; background: #111; position: relative; overflow: hidden; min-height: 10%; }
        #view-2d { flex: 1; background: var(--panel); min-height: 10%; position: relative; }

        /* DRAGGABLE DIVIDER */
        #resizer { height: 12px; width: 100%; background: #222; cursor: ns-resize; display: flex; align-items: center; justify-content: center; z-index: 2000; border-top: 1px solid #333; border-bottom: 1px solid #000; touch-action: none; }
        #resizer::after { content: ''; width: 40px; height: 4px; background: #555; border-radius: 2px; }

        /* DESKTOP SIDE-BY-SIDE VIEW */
        @media (min-width: 768px) {
            #app-shell { flex-direction: row; }
            #view-3d { width: 50%; height: 100% !important; min-width: 10%; }
            #resizer { width: 12px; height: 100%; cursor: ew-resize; border: none; border-left: 1px solid #333; border-right: 1px solid #000; }
            #resizer::after { width: 4px; height: 40px; }
        }

        /* CHAT SYSTEM */
        #chat-outer { position: absolute; bottom: 60px; left: 10px; width: 260px; height: 220px; background: rgba(0,0,0,0.6); border-radius: 10px; display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.1); z-index: 1200; backdrop-filter: blur(5px); }
        #chat-messages { flex: 1; overflow-y: auto; padding: 8px; font-size: 13px; display: flex; flex-direction: column; gap: 4px; }
        .msg b { color: var(--accent); }
        #chat-input-row { display: flex; border-top: 1px solid rgba(255,255,255,0.1); padding: 5px; gap: 5px; }
        #chat-input-row input { flex: 1; background: rgba(0,0,0,0.3); border: 1px solid #444; padding: 8px; color: white; font-size: 13px; margin: 0; border-radius: 8px; }
        #chat-send-btn { background: var(--accent); color: #000; border: none; padding: 0 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 11px; height: 35px; }
        
        /* USER LIST / PRESENCE */
        #presence-roster { position: absolute; top: 200px; left: 10px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; font-size: 11px; z-index: 1100; border: 1px solid rgba(255,255,255,0.1); pointer-events: none; }

        /* VIDEO CALL BOX */
        #video-container { position: absolute; top: 10px; left: 10px; width: 280px; height: 180px; background: #000; border-radius: 12px; border: 2px solid var(--accent); overflow: hidden; z-index: 1000; }

        /* SEARCH & BUTTONS */
        #search-container { position: absolute; top: 10px; right: 10px; width: 220px; z-index: 1001; display: none; }
        .controls { position: absolute; bottom: 15px; right: 15px; z-index: 1000; }
        button { background: #fff; color: #000; border: none; padding: 10px 18px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 11px; }
        button.active { background: var(--accent); }
    </style>
</head>
<body>

    <div id="gatekeeper">
        <div class="gate-card">
            <h2>Group Teleport <span style="color:var(--accent)">6.6</span></h2>
            <input type="text" id="room-input" placeholder="Room Code (e.g. PARIS)">
            <input type="text" id="username-input" placeholder="Your Name">
            <div style="display:flex; gap:10px; margin: 15px 0;">
                <button id="btn-t" onclick="App.setRole('tourist')" style="flex:1">TOURIST</button>
                <button id="btn-g" onclick="App.setRole('guide')" style="flex:1; background:#222; color:#888;">GUIDE</button>
            </div>
            <button id="launch-btn" onclick="App.launch()" style="width:100%; background: var(--accent); color:black; padding:15px; border-radius: 12px; font-weight:bold;">LAUNCH TOUR</button>
        </div>
    </div>

    <div id="app-shell">
        <div id="view-3d">
            <div id="presence-roster">
                <div style="color:var(--accent); font-weight:bold; margin-bottom:5px;">ONLINE</div>
                <div id="user-list-render"></div>
            </div>
            
            <div id="chat-outer">
                <div id="chat-messages"></div>
                <div id="chat-input-row">
                    <input type="text" id="chat-msg-field" placeholder="Message..." onkeydown="if(event.key==='Enter') App.brain.sendChat()">
                    <button id="chat-send-btn" onclick="App.brain.sendChat()">SEND</button>
                </div>
            </div>
            
            <div id="video-container"></div>
            
            <div id="search-container"></div> <div class="controls" id="tourist-controls" style="display:none;">
                <button id="tether-btn" onclick="App.brain.toggleTether()">Tethered</button>
            </div>
        </div>

        <div id="resizer"></div>
        <div id="view-2d"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, push, onDisconnect, update, remove, serverTimestamp, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-functions.js";

        const App = {
            state: { 
                role: 'tourist', 
                room: 'LOBBY', 
                name: 'User', 
                id: "U"+Date.now(), 
                isTethered: true, 
                isSyncing: false 
            },
            
            setRole: function(r) {
                this.state.role = r;
                document.getElementById('btn-t').style = r==='tourist' ? "background:#fff" : "background:#222;color:#888";
                document.getElementById('btn-g').style = r==='guide' ? "background:#fff" : "background:#222;color:#888";
            },

            launch: async function() {
                this.state.name = document.getElementById('username-input').value || "User";
                this.state.room = document.getElementById('room-input').value.toUpperCase() || "LOBBY";
                
                const launchBtn = document.getElementById('launch-btn');
                launchBtn.innerText = "CONNECTING...";
                launchBtn.disabled = true;

                try {
                    const config = { 
                        databaseURL: "https://virtual-tour-platform-492518-default-rtdb.firebaseio.com",
                        projectId: "virtual-tour-platform-492518" 
                    };
                    const firebaseApp = initializeApp(config);
                    App.postOffice.db = getDatabase(firebaseApp);
                    App.functions = getFunctions(firebaseApp);

                    document.getElementById('gatekeeper').style.display = 'none';
                    document.getElementById('app-shell').style.display = 'flex';

                    App.postOffice.init(); 
                    await App.eyes.init(); 
                    await App.studio.init(); 
                    App.ui.initResizer();

                    if(this.state.role === 'guide') { 
                        document.getElementById('search-container').style.display = 'block'; 
                        App.postOffice.clearChat(); 
                    } else { 
                        document.getElementById('tourist-controls').style.display = 'block'; 
                    }
                } catch (err) {
                    console.error("Launch Error:", err);
                    alert("Launch Failed: Check console.");
                    launchBtn.innerText = "LAUNCH TOUR";
                    launchBtn.disabled = false;
                }
            },

            brain: {
                toggleTether: function() {
                    App.state.isTethered = !App.state.isTethered;
                    const btn = document.getElementById('tether-btn');
                    btn.innerText = App.state.isTethered ? "Tethered" : "Roaming";
                    btn.className = App.state.isTethered ? "" : "active";
                    if(App.state.isTethered) {
                        onValue(ref(App.postOffice.db, "rooms/"+App.state.room+"/guide"), s => { 
                            if(s.val()) App.postOffice.applyMove(s.val()); 
                        }, {onlyOnce: true});
                    }
                },
                sendChat: function() {
                    const field = document.getElementById('chat-msg-field');
                    if(!field.value.trim()) return;
                    push(ref(App.postOffice.db, "rooms/"+App.state.room+"/chats"), { 
                        sender: App.state.name, 
                        text: field.value, 
                        time: serverTimestamp() 
                    });
                    field.value = "";
                }
            }
        };

        window.App = App;

        App.ui = {
            initResizer: function() {
                const resizer = document.getElementById('resizer'), v3d = document.getElementById('view-3d');
                let dragging = false;
                const move = (e) => {
                    if (!dragging) return;
                    const y = e.touches ? e.touches[0].clientY : e.clientY, x = e.touches ? e.touches[0].clientX : e.clientX;
                    if (window.innerWidth >= 768) { 
                        let v = (x / window.innerWidth) * 100; 
                        if(v > 10 && v < 90) v3d.style.width = v + '%'; 
                    } else { 
                        let v = (y / window.innerHeight) * 100; 
                        if(v > 10 && v < 90) v3d.style.height = v + '%'; 
                    }
                };
                resizer.addEventListener('mousedown', () => dragging = true);
                resizer.addEventListener('touchstart', () => dragging = true);
                window.addEventListener('mousemove', move);
                window.addEventListener('touchmove', move);
                window.addEventListener('mouseup', () => dragging = false);
                window.addEventListener('touchend', () => dragging = false);
            }
        };

        App.eyes = {
            map: null, panorama: null, markers: {},
            init: async function() {
                const { Map } = await google.maps.importLibrary("maps");
                const { StreetViewPanorama, StreetViewService } = await google.maps.importLibrary("streetView");
                const { PlaceAutocompleteElement } = await google.maps.importLibrary("places");

                const center = { lat: 44.4268, lng: 26.1025 };
                this.map = new Map(document.getElementById('view-2d'), { center, zoom: 17 });
                this.panorama = new StreetViewPanorama(document.getElementById('view-3d'), { position: center, visible: true, disableDefaultUI: true });
                this.map.setStreetView(this.panorama);

                if(App.state.role === 'guide') {
                    const searchElement = new PlaceAutocompleteElement();
                    document.getElementById("search-container").appendChild(searchElement);
                    const svService = new StreetViewService();

                    searchElement.addEventListener("gmp-placeselect", async ({place}) => {
                        if (!place.location) return;
                        svService.getPanorama({ location: place.location, radius: 50 }, (data, status) => {
                            if (status === "OK") {
                                const svPos = data.location.latLng;
                                this.panorama.setPosition(svPos);
                                App.postOffice.transmit({ lat: svPos.lat(), lng: svPos.lng(), h: this.panorama.getPov().heading, p: this.panorama.getPov().pitch });
                            }
                        });
                    });
                }

                const report = () => {
                    const p = this.panorama.getPosition(), v = this.panorama.getPov();
                    if(!p || App.state.isSyncing) return;
                    update(ref(App.postOffice.db, "rooms/"+App.state.room+"/users/"+App.state.id), { 
                        lat: p.lat(), lng: p.lng(), name: App.state.name, role: App.state.role 
                    });
                    if(App.state.role === 'guide') App.postOffice.transmit({ lat: p.lat(), lng: p.lng(), h: v.heading, p: v.pitch });
                };
                this.panorama.addListener('position_changed', report);
                this.panorama.addListener('pov_changed', report);
            }
        };

        App.postOffice = {
            db: null,
            init: function() {
                onDisconnect(ref(this.db, "rooms/"+App.state.room+"/users/"+App.state.id)).remove();
                onChildAdded(ref(this.db, "rooms/"+App.state.room+"/chats"), s => {
